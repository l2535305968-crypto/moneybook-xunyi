<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 记账</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght=300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }
        .main-content { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 15px;
            padding-bottom: 100px;
        }
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #999; 
            margin-bottom: 15px; 
            letter-spacing: 4px;
        }
        .type-toggle { display: flex; background: #f5f5f5; border-radius: 16px; padding: 6px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 14px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 15px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; color: #666; }
        .type-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 14px; 
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .amount-input { font-size: 32px !important; font-weight: 500; text-align: center; color: #333; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .category-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .category-item { padding: 12px 8px; text-align: center; border-radius: 16px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; background: #fafafa; }
        .category-item:hover { transform: scale(1.05); background: #f5f5f5; }
        .category-item.selected { border-color: #333; background: #f5f5f5; }
        .category-icon { font-size: 24px; margin-bottom: 5px; }
        .category-name { font-size: 11px; color: #999; }
        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
            width: 100%; 
            padding: 16px;
        }
        .bill-section { background: #fafafa; border-radius: 18px; padding: 18px; margin-top: 20px; }
        .bill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .bill-title { font-size: 14px; color: #999; display: flex; align-items: center; gap: 5px; letter-spacing: 1px; }
        .bill-toggle { font-size: 12px; color: #ccc; }
        .bill-content { display: none; }
        .bill-content.show { display: block; }
        .bill-source-btns { display: flex; gap: 10px; margin: 10px 0; }
        .bill-source-btn { flex: 1; padding: 12px; border: 1px solid #eee; border-radius: 12px; background: #fff; cursor: pointer; font-size: 14px; text-align: center; color: #666; }
        .bill-source-btn.active { background: #333; color: #fff; border-color: #333; }
        .bill-textarea { width: 100%; height: 100px; border: 1px solid #eee; border-radius: 14px; padding: 14px; font-size: 14px; resize: none; background: #fafafa; }
        .parse-result { margin-top: 10px; padding: 14px; background: #fff; border-radius: 14px; font-size: 14px; border: 1px solid #eee; }
        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .toast.show { opacity: 1; }
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">记账</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="categories.html">📂 分类</a>
        </div>
    </div>

    <div class="main-content">
        <div class="ink-card">
            <div class="ink-title">💰 记账金额</div>
            <div class="type-toggle">
                <div class="type-btn expense active" data-type="expense" onclick="switchType('expense')">
                    <span>💸</span> 支出
                </div>
                <div class="type-btn income" data-type="income" onclick="switchType('income')">
                    <span>💰</span> 收入
                </div>
            </div>

            <form id="recordForm">
                <div class="form-group">
                    <input type="number" id="amountInput" class="amount-input" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label>选择分类</label>
                    <div class="category-grid" id="categoryGrid"></div>
                    <input type="hidden" id="selectedCategory" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>账户</label>
                        <select id="accountSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" id="dateInput" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>时间</label>
                        <input type="time" id="timeInput" required>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="remarkInput" placeholder="可选">
                    </div>
                </div>

                <button type="submit" class="ink-btn ink-btn-primary">保存记录</button>
            </form>

            <div class="bill-section">
                <div class="bill-header" onclick="toggleBillSection()">
                    <span class="bill-title">📋 微信/支付宝账单识别</span>
                    <span class="bill-toggle" id="billToggle">▼</span>
                </div>
                <div class="bill-content" id="billContent">
                    <div class="bill-source-btns">
                        <div class="bill-source-btn active" data-source="wechat" onclick="selectBillSource('wechat')">微信</div>
                        <div class="bill-source-btn" data-source="alipay" onclick="selectBillSource('alipay')">支付宝</div>
                    </div>
                    <textarea class="bill-textarea" id="billText" placeholder="粘贴账单文本，自动识别金额、日期..."></textarea>
                    <button class="ink-btn ink-btn-primary" style="margin-top: 10px; padding: 12px;" onclick="parseBill()">识别账单</button>
                    <div class="parse-result" id="parseResult" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item active">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let currentType = 'expense';
        let selectedCategory = null;
        let billSource = 'wechat';

        if (!currentAccountId) {
            alert('请先登录');
            location.href = 'index.html';
        }

        async function loadAccount() {
            if (!currentAccountId) {
                alert('请先登录');
                location.href = 'index.html';
                return;
            }
            
            try {
                accountData = await api.get(`/account/${currentAccountId}`);
                initApp();
            } catch (err) {
                console.error('加载账户失败:', err);
                localStorage.removeItem('accountId');
                localStorage.removeItem('accountName');
                alert('账户无效或不存在，请重新登录');
                location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', loadAccount);

        function initApp() {
            initDatePicker();
            updateAccountSelect();
            renderCategories();
        }

        function initDatePicker() {
            const now = new Date();
            flatpickr('#dateInput', {
                locale: 'zh',
                dateFormat: 'Y-m-d',
                defaultDate: now,
                allowInput: true
            });
            document.getElementById('timeInput').value = now.toTimeString().substring(0, 5);
        }

        function updateAccountSelect() {
            const select = document.getElementById('accountSelect');
            select.innerHTML = '';
            accountData.accounts.filter(a => a.status === 'active').forEach(acc => {
                select.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
            });
        }

        function formatCategoryName(cat) {
            if (cat.modernName && cat.modernName !== cat.name) {
                return `${cat.name}<br><span style="font-size: 0.85em; opacity: 0.65;">(${cat.modernName})</span>`;
            }
            return cat.name;
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            renderCategories();
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';

            const filtered = accountData.categories.filter(c => c.type === currentType);
            filtered.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.dataset.id = cat.id;
                item.innerHTML = `
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${formatCategoryName(cat)}</div>
                `;
                item.onclick = () => selectCategory(cat.id);
                grid.appendChild(item);
            });
        }

        function selectCategory(id) {
            selectedCategory = id;
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.toggle('selected', item.dataset.id === id);
            });
            document.getElementById('selectedCategory').value = id;
        }

        function toggleBillSection() {
            const content = document.getElementById('billContent');
            const toggle = document.getElementById('billToggle');
            content.classList.toggle('show');
            toggle.textContent = content.classList.contains('show') ? '▲' : '▼';
        }

        function selectBillSource(source) {
            billSource = source;
            document.querySelectorAll('.bill-source-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.source === source);
            });
        }

        async function parseBill() {
            const text = document.getElementById('billText').value.trim();
            if (!text) {
                showToast('请输入账单文本');
                return;
            }

            try {
                const result = await api.post('/parse-bill', { text, source: billSource });

                if (result.amount) {
                    document.getElementById('amountInput').value = result.amount;
                    document.getElementById('remarkInput').value = result.remark || '';

                    if (result.date) {
                        const dateStr = result.date.split('T')[0];
                        document.getElementById('dateInput')._flatpickr.setDate(dateStr);
                    }

                    if (result.type === 'income') {
                        switchType('income');
                    } else {
                        switchType('expense');
                    }

                    if (result.categorySuggestions && result.categorySuggestions.length > 0) {
                        selectCategory(result.categorySuggestions[0]);
                    }

                    const parseResultEl = document.getElementById('parseResult');
                    parseResultEl.style.display = 'block';
                    parseResultEl.innerHTML = `
                        <div style="color: #333; margin-bottom: 5px;">✅ 识别成功</div>
                        <div>金额: <strong>¥${result.amount}</strong></div>
                        <div>类型: ${result.type === 'income' ? '收入' : '支出'}</div>
                        ${result.remark ? `<div>备注: ${result.remark}</div>` : ''}
                    `;

                    showToast('账单识别成功');
                } else {
                    showToast('无法识别账单，请手动输入');
                }
            } catch (err) {
                showToast('识别失败');
            }
        }

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amountInput').value);
            if (!amount || amount <= 0) {
                showToast('请输入有效金额');
                return;
            }

            if (!selectedCategory) {
                showToast('请选择分类');
                return;
            }

            const dateValue = document.getElementById('dateInput').value;
            const timeValue = document.getElementById('timeInput').value;
            const dateTime = new Date(`${dateValue}T${timeValue}`).toISOString();

            const record = {
                accountId: document.getElementById('accountSelect').value,
                categoryId: selectedCategory,
                amount: amount,
                type: currentType,
                date: dateTime,
                remark: document.getElementById('remarkInput').value,
                source: 'manual'
            };

            try {
                await api.post('/records', { accountId: currentAccountId, record });
                showToast('记录已保存');
                document.getElementById('recordForm').reset();
                initDatePicker();
                selectedCategory = null;
                renderCategories();
            } catch (err) {
                showToast('保存失败');
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadAccount();
    </script>
</body>
</html>
