<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 群详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: #f8f7f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header {
            background: #fff;
            color: #333;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            font-size: 32px;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .back-btn {
            background: #f5f5f5;
            border: none;
            color: #666;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: #eee; color: #333; }
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            padding-bottom: 80px;
        }
        .ink-card {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title {
            font-size: 16px;
            color: #999;
            margin-bottom: 15px;
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .balance-card {
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            text-align: center;
        }
        .balance-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .balance-amount {
            font-size: 48px;
            font-weight: 300;
            color: #333;
            letter-spacing: -1px;
        }
        .balance-amount::before { content: '¥ '; font-size: 24px; opacity: 0.6; }
        .account-list {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .account-badge {
            background: #fafafa;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid #f0f0f0;
            color: #666;
        }
        .account-badge span {
            color: #333;
            font-weight: 500;
        }
        .group-id-box {
            margin-top: 15px;
            padding: 14px 16px;
            background: #fafafa;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0f0f0;
        }
        .group-id-label {
            font-size: 13px;
            color: #999;
            letter-spacing: 1px;
        }
        .group-id-value {
            font-size: 13px;
            color: #333;
            font-family: monospace;
        }
        .copy-btn {
            background: #fff;
            border: 1px solid #eee;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
        }
        .copy-btn:hover {
            background: #f5f5f5;
            color: #333;
        }
        .type-toggle {
            display: flex;
            background: #f5f5f5;
            border-radius: 16px;
            padding: 6px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #999;
            transition: all 0.3s ease;
        }
        .type-btn.active {
            background: #fff;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #eee;
            border-radius: 14px;
            font-size: 14px;
            background: #fafafa;
            color: #333;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ddd;
            background: #fff;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-row .form-group { flex: 1; }
        .amount-input {
            font-size: 24px !important;
            font-weight: 300;
            text-align: center;
            padding: 16px !important;
            letter-spacing: 2px;
        }
        .ink-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary {
            background: #333;
            color: #fff;
        }
        .ink-btn-primary:hover { background: #444; }
        .ink-btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .ink-btn-secondary:hover { background: #eee; }
        .ink-btn-small {
            padding: 8px 14px;
            font-size: 12px;
            width: auto;
        }
        .ink-btn-danger {
            background: #fafafa;
            color: #666;
        }
        .ink-btn-danger:hover { background: #f5f5f5; color: #444; }
        .record-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .record-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f8f7f5;
            gap: 14px;
        }
        .record-item:last-child { border-bottom: none; }
        .record-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #fafafa;
        }
        .record-info { flex: 1; }
        .record-category {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        .record-remark {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }
        .record-amount {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .record-amount.expense { color: #333; }
        .record-amount.income { color: #666; }
        .record-amount::before { content: '¥ '; font-size: 12px; opacity: 0.5; }
        .record-meta {
            font-size: 11px;
            color: #ccc;
        }
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .member-card {
            background: #fafafa;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #f0f0f0;
        }
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .member-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }
        .creator-badge {
            background: #333;
            color: #fff;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .member-account {
            background: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #f0f0f0;
        }
        .account-label {
            font-size: 12px;
            color: #999;
        }
        .account-id {
            font-size: 12px;
            color: #333;
            font-family: monospace;
        }
        .member-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid #f0f0f0;
        }
        .stat-icon { font-size: 14px; }
        .stat-value { color: #666; }
        .stat-value.expense { color: #333; font-weight: 500; }
        .stat-value.income { color: #666; font-weight: 500; }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #ccc;
        }
        .empty-state-icon {
            font-size: 52px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #333;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        .modal-body { padding: 25px; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-group .ink-btn { flex: 1; }
        .icon-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .icon-option {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }
        .icon-option:hover { background: #f5f5f5; }
        .icon-option.selected {
            background: #fff;
            border-color: #ddd;
        }
        .color-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .color-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .color-option.selected {
            border-color: #333;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 14px 24px;
            border-radius: 50px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 14px;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-top">
            <button class="back-btn" onclick="location.href='groups.html'">◀ 返回</button>
            <div class="header-title" id="groupName">群详情</div>
            <div style="width: 60px;"></div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="empty-state" id="loadingState">
            <div class="empty-state-icon">⏳</div>
            <p>加载中...</p>
        </div>

        <div id="detailContent" style="display: none;">
            <div class="balance-card">
                <div class="balance-label">群总资金</div>
                <div class="balance-amount" id="groupBalance">0.00</div>
                <div class="account-list" id="groupAccounts"></div>
                <div class="group-id-box">
                    <div>
                        <span class="group-id-label">群ID：</span>
                        <span class="group-id-value" id="groupIdDisplay">-</span>
                    </div>
                    <button class="copy-btn" onclick="copyGroupId()">复制</button>
                </div>
            </div>

            <div class="ink-card">
                <div class="ink-title">👥 群成员</div>
                <div class="member-list" id="memberList"></div>
            </div>

            <div class="ink-card">
                <div class="ink-title">📝 在群中记账</div>
                <div class="type-toggle">
                    <div class="type-btn expense active" onclick="setType('expense')">💸 支出</div>
                    <div class="type-btn income" onclick="setType('income')">💰 收入</div>
                </div>
                <form onsubmit="submitRecord(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>记到账户</label>
                            <select id="accountSelect" required></select>
                        </div>
                        <div class="form-group">
                            <label>分类 <button type="button" onclick="openCategoryModal()" class="ink-btn ink-btn-secondary ink-btn-small">⚙️</button></label>
                            <select id="categorySelect" required></select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>金额</label>
                            <input type="number" id="amountInput" class="amount-input" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" id="dateInput" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="remarkInput" placeholder="可选">
                    </div>
                    <button type="submit" class="ink-btn ink-btn-primary">保存记录</button>
                </form>
            </div>

            <div class="ink-card">
                <div class="ink-title">📜 群记账记录</div>
                <div class="record-list" id="recordList"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="addAccountModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">添加群账户</span>
                <button class="modal-close" onclick="closeAddAccountModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>账户名称</label>
                    <input type="text" id="newAccountName" placeholder="输入账户名称" maxlength="20">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="newAccountType">
                        <option value="cash">现金</option>
                        <option value="wechat">微信</option>
                        <option value="alipay">支付宝</option>
                        <option value="bank">银行卡</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button class="ink-btn ink-btn-secondary" onclick="closeAddAccountModal()">取消</button>
                    <button class="ink-btn ink-btn-primary" onclick="addAccount()">添加</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <span class="modal-title">📦 管理分类</span>
                <button class="modal-close" onclick="closeCategoryModal()">×</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 25px; padding: 20px; background: #fafafa; border-radius: 18px; border: 1px solid #f0f0f0;">
                    <div class="form-group">
                        <label>分类名称（古风名）</label>
                        <input type="text" id="newCategoryName" placeholder="输入分类名称" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label>现代解释（可选）</label>
                        <input type="text" id="newCategoryModernName" placeholder="输入现代解释" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="newCategoryType">
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>图标</label>
                        <div class="icon-grid" id="iconSelect"></div>
                    </div>
                    <div class="form-group">
                        <label>颜色</label>
                        <div class="color-grid" id="colorSelect"></div>
                    </div>
                    <button class="ink-btn ink-btn-primary" onclick="addCategory()">➕ 添加分类</button>
                </div>
                <div>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="ink-btn ink-btn-primary ink-btn-small" onclick="showCategoryType('expense')" id="expenseTypeBtn">支出</button>
                        <button class="ink-btn ink-btn-secondary ink-btn-small" onclick="showCategoryType('income')" id="incomeTypeBtn">收入</button>
                    </div>
                    <div id="categoryList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let groupId = new URLSearchParams(location.search).get('id');
        let groupData = null;
        let currentType = 'expense';
        let currentAccountId = localStorage.getItem('accountId');
        let currentAccountName = localStorage.getItem('accountName') || '成员';
        let isCreator = false;

        if (!currentAccountId) {
            alert('请先登录');
            location.href = 'index.html';
        }

        const defaultCategories = [
            { id: 'cat_food',     name: '饮馔', modernName: '餐饮', icon: '🍵', color: '#FCE4EC', type: 'expense' },
            { id: 'cat_trans',    name: '舟车', modernName: '交通', icon: '⛵', color: '#E8F5E9', type: 'expense' },
            { id: 'cat_shop',     name: '采买', modernName: '购物', icon: '🧺', color: '#E3F2FD', type: 'expense' },
            { id: 'cat_entertain', name: '闲乐', modernName: '娱乐', icon: '🎯', color: '#E8F5E9', type: 'expense' },
            { id: 'cat_living',   name: '居处', modernName: '居住', icon: '🏯', color: '#F3E5F5', type: 'expense' },
            { id: 'cat_medical',  name: '药石', modernName: '医疗', icon: '🏺', color: '#FCE4EC', type: 'expense' },
            { id: 'cat_edu',      name: '束脩', modernName: '教育', icon: '📜', color: '#E0F7FA', type: 'expense' },
            { id: 'cat_clothes',  name: '衣饰', modernName: '服饰', icon: '👘', color: '#FCE4EC', type: 'expense' },
            { id: 'cat_comm',     name: '鸿雁', modernName: '通讯', icon: '🕊️', color: '#E3F2FD', type: 'expense' },
            { id: 'cat_beauty',   name: '妆奁', modernName: '美妆', icon: '🪞', color: '#FCE4EC', type: 'expense' },
            { id: 'cat_social',   name: '人情', modernName: '往来', icon: '🎁', color: '#F5F5DC', type: 'expense' },
            { id: 'cat_other',    name: '杂项', modernName: '其他', icon: '🎋', color: '#F5F5DC', type: 'expense' },
            { id: 'cat_salary',   name: '俸禄', modernName: '工资', icon: '🪙', color: '#E8F5E9', type: 'income' },
            { id: 'cat_invest',   name: '利市', modernName: '理财', icon: '🧮', color: '#FFF8E1', type: 'income' },
            { id: 'cat_bonus',    name: '赏银', modernName: '奖金', icon: '🥇', color: '#FFF3E0', type: 'income' },
            { id: 'cat_parttime', name: '佣钱', modernName: '兼职', icon: '🔨', color: '#F5F5DC', type: 'income' },
            { id: 'cat_gift',     name: '贺仪', modernName: '红包', icon: '🧧', color: '#FCE4EC', type: 'income' },
            { id: 'cat_writing',  name: '润笔', modernName: '稿费', icon: '✒️', color: '#E0F7FA', type: 'income' }
        ];

        const icons = ['🍵','⛵','🧺','🎯','🏯','🏺','📜','👘','🕊️','🪞','🎁','🎋','🪙','🧮','🥇','🔨','🧧','✒️','🎐','🎎','🎴','🎑','🎏','🏮','🎀','🌸','🎋','🍃','🌿','☘️','🪷','🪶'];
        const colors = ['#FCE4EC','#E8F5E9','#E3F2FD','#F3E5F5','#E0F7FA','#FFF8E1','#FFF3E0','#F5F5DC','#E8F5E9','#FCE4EC','#E3F2FD','#F3E5F5','#E0F7FA','#F5F5DC','#FFF3E0','#FFF8E1','#FCE4EC','#E8F5E9'];
        let selectedIcon = '🎋';
        let selectedColor = '#F5F5DC';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateId(prefix) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = prefix + '_';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function formatCategoryName(cat) {
            if (cat.modernName && cat.modernName !== cat.name) {
                return `${cat.icon} ${cat.name} (${cat.modernName})`;
            }
            return `${cat.icon} ${cat.name}`;
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.type-btn.${type}`).classList.add('active');
            renderCategories();
        }

        async function loadGroup() {
            if (!groupId) {
                location.href = 'groups.html';
                return;
            }

            try {
                groupData = await api.get(`/api/groups/${groupId}`);
                document.getElementById('groupName').textContent = groupData.name;
                document.getElementById('groupIdDisplay').textContent = groupData.id;
                
                // 检查当前用户是否是群主
                isCreator = groupData.creatorId === currentAccountId;
                
                renderGroup();
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('detailContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loadingState').innerHTML = '<div class="empty-state-icon">❌</div><p>加载失败</p>';
            }
        }

        async function copyGroupId() {
            try {
                await navigator.clipboard.writeText(groupId);
                showToast('群ID已复制！');
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = groupId;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('群ID已复制！');
            }
        }

        function renderGroup() {
            const totalBalance = groupData.accounts ? groupData.accounts.reduce((sum, a) => sum + a.balance, 0) : 0;
            document.getElementById('groupBalance').textContent = totalBalance.toFixed(2);

            const accountsHtml = groupData.accounts ? groupData.accounts.map(a => 
                `<div class="account-badge">${a.name} <span>¥${a.balance.toFixed(2)}</span></div>`
            ).join('') : '';
            document.getElementById('groupAccounts').innerHTML = accountsHtml;

            // 计算成员统计
            const memberStats = {};
            (groupData.members || []).forEach(m => {
                memberStats[m.accountId] = { name: m.name, income: 0, expense: 0, count: 0 };
            });

            (groupData.records || []).forEach(r => {
                if (memberStats[r.memberId]) {
                    if (r.type === 'income') {
                        memberStats[r.memberId].income += r.amount;
                    } else {
                        memberStats[r.memberId].expense += r.amount;
                    }
                    memberStats[r.memberId].count++;
                }
            });

            const membersHtml = groupData.members ? groupData.members.map(m => {
                const stats = memberStats[m.accountId];
                const net = stats.income - stats.expense;
                const isMemberCreator = m.role === 'admin';
                const canRemove = isCreator && !isMemberCreator;
                return `
                    <div class="member-card">
                        <div class="member-header">
                            <div class="member-name">${m.name}</div>
                            ${isMemberCreator ? '<span class="creator-badge">👑 群主</span>' : ''}
                        </div>
                        ${isCreator ? `
                            <div class="member-account">
                                <span class="account-label">账户ID：</span>
                                <span class="account-id">${m.accountId}</span>
                            </div>
                        ` : ''}
                        <div class="member-stats">
                            <div class="stat-item">
                                <span class="stat-icon">📝</span>
                                <span class="stat-value">${stats.count}条</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-icon">💸</span>
                                <span class="stat-value expense">¥${stats.expense.toFixed(2)}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-icon">💰</span>
                                <span class="stat-value income">¥${stats.income.toFixed(2)}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-icon">📊</span>
                                <span class="stat-value ${net >= 0 ? 'income' : 'expense'}">${net >= 0 ? '+' : ''}¥${net.toFixed(2)}</span>
                            </div>
                        </div>
                        ${canRemove ? `
                            <div style="margin-top: 12px; text-align: right;">
                                <button class="ink-btn ink-btn-danger ink-btn-small" onclick="removeMember('${m.accountId}')">🚪 移出群</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('') : '';
            document.getElementById('memberList').innerHTML = membersHtml;

            renderAccountSelect();
            renderCategories();
            renderRecords();

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = today;
        }

        function renderAccountSelect() {
            const select = document.getElementById('accountSelect');
            if (!groupData.accounts || groupData.accounts.length === 0) {
                select.innerHTML = '<option value="">暂无账户</option>';
                return;
            }
            select.innerHTML = groupData.accounts.map(a => 
                `<option value="${a.id}">${a.name}</option>`
            ).join('');
        }

        function getCategories() {
            return groupData && groupData.categories ? groupData.categories : defaultCategories;
        }

        function renderCategories() {
            const select = document.getElementById('categorySelect');
            const categories = getCategories();
            const filtered = categories.filter(c => c.type === currentType);
            select.innerHTML = filtered.map(c => 
                `<option value="${c.id}">${formatCategoryName(c)}</option>`
            ).join('');
        }

        function renderRecords() {
            const container = document.getElementById('recordList');
            const records = groupData.records || [];
            const categories = getCategories();

            if (records.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>还没有记录</p></div>';
                return;
            }

            container.innerHTML = records.slice().reverse().map(r => {
                const cat = categories.find(c => c.id === r.categoryId) || { name: '其他', icon: '📦' };
                const displayName = cat.modernName && cat.modernName !== cat.name ? `${cat.name} (${cat.modernName})` : cat.name;
                return `
                    <div class="record-item">
                        <div class="record-icon">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-category">${displayName}</div>
                            <div class="record-remark">${r.remark || ''} · ${r.memberName || ''}</div>
                        </div>
                        <div>
                            <div class="record-amount ${r.type}">${r.type === 'income' ? '+' : '-'}${parseFloat(r.amount).toFixed(2)}</div>
                            <div class="record-meta">${new Date(r.date).toLocaleDateString('zh-CN')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function submitRecord(event) {
            event.preventDefault();

            if (!groupData.accounts || groupData.accounts.length === 0) {
                showToast('请先添加群账户');
                return;
            }

            const accountId = document.getElementById('accountSelect').value;
            const categoryId = document.getElementById('categorySelect').value;
            const amount = parseFloat(document.getElementById('amountInput').value);
            const date = document.getElementById('dateInput').value;
            const remark = document.getElementById('remarkInput').value;

            if (!accountId || !categoryId || !amount || !date) {
                showToast('请填写完整信息');
                return;
            }

            try {
                await api.post(`/api/groups/${groupId}/record`, {
                    accountId,
                    categoryId,
                    amount,
                    type: currentType,
                    date,
                    remark,
                    memberId: currentAccountId,
                    memberName: currentAccountName
                });

                showToast('记账成功！');
                document.getElementById('amountInput').value = '';
                document.getElementById('remarkInput').value = '';
                loadGroup();
            } catch (err) {
                showToast('记账失败');
            }
        }

        // 分类管理
        let categoryModalType = 'expense';

        function openCategoryModal() {
            document.getElementById('categoryModal').classList.add('show');
            renderIconSelect();
            renderColorSelect();
            showCategoryType('expense');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('show');
        }

        function showCategoryType(type) {
            categoryModalType = type;
            document.getElementById('expenseTypeBtn').className = type === 'expense' ? 'ink-btn ink-btn-primary ink-btn-small' : 'ink-btn ink-btn-secondary ink-btn-small';
            document.getElementById('incomeTypeBtn').className = type === 'income' ? 'ink-btn ink-btn-primary ink-btn-small' : 'ink-btn ink-btn-secondary ink-btn-small';
            document.getElementById('newCategoryType').value = type;
            renderCategoryList();
        }

        function renderIconSelect() {
            const container = document.getElementById('iconSelect');
            container.innerHTML = icons.map(icon => 
                `<div class="icon-option ${selectedIcon === icon ? 'selected' : ''}" onclick="selectIcon('${icon}')" title="${icon}">${icon}</div>`
            ).join('');
        }

        function renderColorSelect() {
            const container = document.getElementById('colorSelect');
            container.innerHTML = colors.map(color => 
                `<div class="color-option ${selectedColor === color ? 'selected' : ''}" onclick="selectColor('${color}')" style="background:${color}" title="${color}"></div>`
            ).join('');
        }

        function selectIcon(icon) {
            selectedIcon = icon;
            renderIconSelect();
        }

        function selectColor(color) {
            selectedColor = color;
            renderColorSelect();
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            const modernName = document.getElementById('newCategoryModernName').value.trim();
            const type = document.getElementById('newCategoryType').value;

            if (!name) {
                showToast('请输入分类名称');
                return;
            }

            try {
                await api.post(`/api/groups/${groupId}/categories`, {
                    name,
                    modernName,
                    icon: selectedIcon,
                    color: selectedColor,
                    type
                });
                showToast('添加成功！');
                document.getElementById('newCategoryName').value = '';
                document.getElementById('newCategoryModernName').value = '';
                loadGroup();
                renderCategoryList();
            } catch (err) {
                showToast('添加失败');
            }
        }

        async function deleteCategory(categoryId) {
            if (!confirm('确定删除这个分类吗？')) return;

            try {
                await api.delete(`/api/groups/${groupId}/categories/${categoryId}`);
                showToast('删除成功！');
                loadGroup();
                renderCategoryList();
            } catch (err) {
                showToast('删除失败');
            }
        }

        function renderCategoryList() {
            const categories = getCategories();
            const filtered = categories.filter(c => c.type === categoryModalType);
            const container = document.getElementById('categoryList');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding:30px;"><div class="empty-state-icon">📦</div><p>暂无分类</p></div>';
                return;
            }

            container.innerHTML = filtered.map(c => {
                const displayName = c.modernName && c.modernName !== c.name ? `${c.name} (${c.modernName})` : c.name;
                return `
                <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid #f8f7f5;">
                    <div style="display:flex; align-items:center; gap:14px;">
                        <div style="width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; background:${c.color || '#fafafa'}">${c.icon || '📦'}</div>
                        <div>
                            <div style="font-weight:500; color:#333;">${displayName}</div>
                            <div style="font-size:12px; color:#999;">${c.type === 'expense' ? '支出' : '收入'}${c.custom ? ' · 自定义' : ''}</div>
                        </div>
                    </div>
                    ${c.custom ? `<button class="ink-btn ink-btn-secondary ink-btn-small" onclick="deleteCategory('${c.id}')">删除</button>` : ''}
                </div>
            `}).join('');
        }

        async function removeMember(memberAccountId) {
            if (!confirm(`确定要将成员移出群吗？`)) {
                return;
            }

            try {
                await api.delete(`/api/groups/${groupId}/members/${memberAccountId}`, {
                    creatorId: currentAccountId
                });

                showToast('成员已移出群！');
                loadGroup();
            } catch (err) {
                showToast('移出失败');
            }
        }

        // 初始化
        loadGroup();
    </script>
</body>
</html>
