<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 数据导出</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght=300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: #f8f7f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header {
            background: #fff;
            color: #333;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .header-title {
            font-size: 32px;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .header-links a {
            color: #999;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.9;
        }
        .header-links a:hover { color: #333; }
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            padding-bottom: 80px;
        }
        .ink-card {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title {
            font-size: 16px;
            color: #999;
            margin-bottom: 15px;
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-card {
            background: #fafafa;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #f0f0f0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label {
            color: #999;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #eee;
            border-radius: 14px;
            font-size: 14px;
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ddd;
            background: #fff;
        }
        .date-range { display: flex; gap: 10px; }
        .date-range .form-group { flex: 1; }
        .ink-btn {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .ink-btn-primary {
            background: #333;
            color: #fff;
        }
        .ink-btn-primary:hover { background: #444; }
        .ink-btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .ink-btn-secondary:hover { background: #eee; }
        .share-link-box {
            background: #fafafa;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 10px;
            color: #666;
            font-family: monospace;
        }
        .ink-tab-bar {
            display: flex;
            background: #fff;
            border-top: 1px solid #f5f5f5;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 0 25px;
        }
        .ink-tab-item {
            flex: 1;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #ccc;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">数据导出</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="categories.html">📂 分类</a>
            <a href="budget.html">📊 预算</a>
        </div>
    </div>

    <div class="main-content">
        <div class="ink-card">
            <div class="ink-title">📊 数据概览</div>
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">账户ID</span>
                    <span class="info-value" id="accountId">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">账户数量</span>
                    <span class="info-value" id="accountCount">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">记账记录</span>
                    <span class="info-value" id="recordCount">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">分类数量</span>
                    <span class="info-value" id="categoryCount">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">数据时间范围</span>
                    <span class="info-value" id="dateRange">-</span>
                </div>
            </div>
        </div>

        <div class="ink-card">
            <div class="ink-title">🔍 筛选条件</div>
            <div class="date-range">
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="endDate">
                </div>
            </div>
            <div class="form-group">
                <label>账户筛选</label>
                <select id="accountFilter">
                    <option value="">全部账户</option>
                </select>
            </div>
            <div class="form-group">
                <label>类型筛选</label>
                <select id="typeFilter">
                    <option value="">全部类型</option>
                    <option value="income">收入</option>
                    <option value="expense">支出</option>
                </select>
            </div>
        </div>

        <div class="ink-card">
            <div class="ink-title">📥 导出格式</div>
            <button class="ink-btn ink-btn-primary" onclick="exportData('json')">
                <span>📄</span> 导出 JSON 格式
            </button>
            <button class="ink-btn ink-btn-secondary" onclick="exportData('csv')">
                <span>📊</span> 导出 CSV 格式
            </button>
        </div>

        <div class="ink-card">
            <div class="ink-title">🔗 分享账户</div>
            <div style="font-size: 13px; color: #999; margin-bottom: 10px;">
                分享以下链接给其他人，他们可以看到并管理同一份记账数据
            </div>
            <div class="share-link-box" id="shareLink">-</div>
            <button class="ink-btn ink-btn-secondary" onclick="copyShareLink()">
                <span>📋</span> 复制链接
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item active">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;

        async function loadAccount() {
            try {
                accountData = await api.get(`/account/${currentAccountId}`);
                renderInfo();
                initDateInputs();
                updateShareLink();
            } catch (err) {
                showToast('加载失败');
            }
        }

        function renderInfo() {
            document.getElementById('accountId').textContent = currentAccountId;
            document.getElementById('accountCount').textContent = `${accountData.accounts.length} 个`;

            const incomeCount = accountData.records.filter(r => r.type === 'income').length;
            const expenseCount = accountData.records.filter(r => r.type === 'expense').length;
            document.getElementById('recordCount').textContent = `${accountData.records.length} 条 (收入${incomeCount} / 支出${expenseCount})`;

            document.getElementById('categoryCount').textContent = `${accountData.categories.length} 个`;

            if (accountData.records.length > 0) {
                const dates = accountData.records.map(r => new Date(r.date)).sort((a, b) => a - b);
                const firstDate = dates[0].toLocaleDateString('zh-CN');
                const lastDate = dates[dates.length - 1].toLocaleDateString('zh-CN');
                document.getElementById('dateRange').textContent = `${firstDate} ~ ${lastDate}`;
            }

            const accountSelect = document.getElementById('accountFilter');
            accountSelect.innerHTML = '<option value="">全部账户</option>';
            accountData.accounts.forEach(acc => {
                accountSelect.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
            });
        }

        function initDateInputs() {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);

            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
        }

        function updateShareLink() {
            const baseUrl = window.location.origin;
            const shareLink = `${baseUrl}/index.html?aid=${currentAccountId}`;
            document.getElementById('shareLink').textContent = shareLink;
        }

        function copyShareLink() {
            const link = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                showToast('链接已复制');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        async function exportData(format) {
            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                const accountFilter = document.getElementById('accountFilter').value;
                const typeFilter = document.getElementById('typeFilter').value;

                let url = `/records/${currentAccountId}`;
                const params = [];
                if (startDate) params.push(`startDate=${startDate}T00:00:00.000Z`);
                if (endDate) params.push(`endDate=${endDate}T23:59:59.999Z`);
                if (accountFilter) params.push(`accountId=${accountFilter}`);
                if (typeFilter) params.push(`type=${typeFilter}`);
                if (params.length > 0) url += '?' + params.join('&');

                let records = await api.get(url);

                if (accountFilter) {
                    records = records.filter(r => r.accountId === accountFilter);
                }
                if (typeFilter) {
                    records = records.filter(r => r.type === typeFilter);
                }

                const categoryMap = {};
                accountData.categories.forEach(c => categoryMap[c.id] = c);
                const accountMap = {};
                accountData.accounts.forEach(a => accountMap[a.id] = a);

                if (format === 'json') {
                    const exportData = {
                        exportTime: new Date().toISOString(),
                        accountId: currentAccountId,
                        recordCount: records.length,
                        records: records.map(r => ({
                            日期: r.date,
                            类型: r.type === 'income' ? '收入' : '支出',
                            金额: parseFloat(r.amount),
                            分类: categoryMap[r.categoryId]?.name || '未知',
                            账户: accountMap[r.accountId]?.name || '未知',
                            备注: r.remark || '',
                            来源: r.source
                        }))
                    };

                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                    downloadBlob(blob, `记账数据_${formatDate(new Date())}.json`);
                } else {
                    const headers = ['日期', '类型', '金额', '分类', '账户', '备注', '来源'];
                    const rows = records.map(r => [
                        r.date,
                        r.type === 'income' ? '收入' : '支出',
                        parseFloat(r.amount),
                        categoryMap[r.categoryId]?.name || '未知',
                        accountMap[r.accountId]?.name || '未知',
                        r.remark || '',
                        r.source
                    ]);

                    let csv = '\uFEFF';
                    csv += headers.join(',') + '\n';
                    rows.forEach(row => {
                        csv += row.map(cell => {
                            const str = String(cell);
                            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                                return '"' + str.replace(/"/g, '""') + '"';
                            }
                            return str;
                        }).join(',') + '\n';
                    });

                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                    downloadBlob(blob, `记账数据_${formatDate(new Date())}.csv`);
                }

                showToast('导出成功');
            } catch (err) {
                console.error('导出失败:', err);
                showToast('导出失败');
            }
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function formatDate(date) {
            return `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadAccount();
    </script>
</body>
</html>
