<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 统计分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: #f8f7f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header {
            background: #fff;
            color: #333;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .header-title {
            font-size: 32px;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .header-links a {
            color: #999;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.9;
        }
        .header-links a:hover { color: #333; }
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            padding-bottom: 80px;
        }
        .filter-bar {
            background: #fff;
            border-radius: 24px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .filter-btn {
            padding: 10px 18px;
            border: 1px solid #eee;
            border-radius: 50px;
            background: #fafafa;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s ease;
        }
        .filter-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        .ink-card {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title {
            font-size: 16px;
            color: #999;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .summary-card {
            text-align: center;
            padding: 20px;
            border-radius: 18px;
            background: #fafafa;
            border: 1px solid #f0f0f0;
        }
        .summary-label {
            font-size: 13px;
            color: #999;
            letter-spacing: 1px;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 500;
            margin-top: 8px;
            color: #333;
        }
        .summary-card.income .summary-value { color: #666; }
        .summary-card.expense .summary-value { color: #333; }
        .summary-card.balance .summary-value { color: #333; }
        .chart-container {
            position: relative;
            height: 250px;
            margin-bottom: 25px;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .chart-row { grid-template-columns: 1fr; }
            .summary-cards { grid-template-columns: 1fr; }
        }
        .category-table {
            width: 100%;
            border-collapse: collapse;
        }
        .category-table th, .category-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f8f7f5;
        }
        .category-table th {
            font-size: 12px;
            color: #999;
            font-weight: normal;
            letter-spacing: 1px;
        }
        .category-table td {
            font-size: 14px;
            color: #333;
        }
        .category-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .ink-tab-bar {
            display: flex;
            background: #fff;
            border-top: 1px solid #f5f5f5;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 800px;
            margin: 0 auto;
            padding: 8px 0 25px;
        }
        .ink-tab-item {
            flex: 1;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #ccc;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #ccc;
        }
        .empty-state-icon {
            font-size: 52px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">统计分析</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="categories.html">📂 分类</a>
            <a href="budget.html">📊 预算</a>
        </div>
    </div>

    <div class="main-content">
        <div class="filter-bar">
            <button class="filter-btn" data-range="week" onclick="setTimeRange('week')">本周</button>
            <button class="filter-btn active" data-range="month" onclick="setTimeRange('month')">本月</button>
            <button class="filter-btn" data-range="year" onclick="setTimeRange('year')">本年</button>
            <button class="filter-btn" data-range="all" onclick="setTimeRange('all')">全部</button>
        </div>

        <div class="ink-card">
            <div class="summary-cards">
                <div class="summary-card income">
                    <div class="summary-label">总收入</div>
                    <div class="summary-value" id="totalIncome">¥0.00</div>
                </div>
                <div class="summary-card expense">
                    <div class="summary-label">总支出</div>
                    <div class="summary-value" id="totalExpense">¥0.00</div>
                </div>
                <div class="summary-card balance">
                    <div class="summary-label">结余</div>
                    <div class="summary-value" id="netBalance">¥0.00</div>
                </div>
            </div>

            <div class="ink-title">💸 支出构成</div>
            <div class="chart-container">
                <canvas id="expensePieChart"></canvas>
            </div>

            <div class="ink-title">📅 每月趋势</div>
            <div class="chart-container">
                <canvas id="trendLineChart"></canvas>
            </div>

            <div class="chart-row">
                <div>
                    <div class="ink-title">📊 收支对比</div>
                    <div class="chart-container" style="height: 200px;">
                        <canvas id="comparisonBarChart"></canvas>
                    </div>
                </div>
                <div>
                    <div class="ink-title">🏷️ 分类明细</div>
                    <div id="categoryTable" style="max-height: 200px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item active">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let statistics = null;
        let currentRange = 'month';
        let expensePieChart = null;
        let trendLineChart = null;
        let comparisonBarChart = null;

        function getDateRange(range) {
            const now = new Date();
            let startDate, endDate;

            endDate = now.toISOString();

            switch (range) {
                case 'week':
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - now.getDay());
                    startDate = weekStart.toISOString();
                    break;
                case 'month':
                    startDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01T00:00:00.000Z`;
                    break;
                case 'year':
                    startDate = `${now.getFullYear()}-01-01T00:00:00.000Z`;
                    break;
                case 'all':
                    startDate = '1970-01-01T00:00:00.000Z';
                    break;
            }

            return { startDate, endDate };
        }

        async function loadStatistics() {
            try {
                accountData = await api.get(`/account/${currentAccountId}`);

                const { startDate, endDate } = getDateRange(currentRange);
                statistics = await api.get(`/statistics/${currentAccountId}?startDate=${startDate}&endDate=${endDate}`);

                renderSummary();
                renderCharts();
                renderCategoryTable();
            } catch (err) {
                console.error('加载失败:', err);
            }
        }

        function setTimeRange(range) {
            currentRange = range;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.range === range);
            });
            loadStatistics();
        }

        function renderSummary() {
            document.getElementById('totalIncome').textContent = `¥${statistics.totalIncome.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `¥${statistics.totalExpense.toFixed(2)}`;
            document.getElementById('netBalance').textContent = `¥${statistics.netIncome.toFixed(2)}`;
        }

        function renderCharts() {
            renderExpensePieChart();
            renderTrendLineChart();
            renderComparisonBarChart();
        }

        function renderExpensePieChart() {
            const ctx = document.getElementById('expensePieChart').getContext('2d');

            if (expensePieChart) {
                expensePieChart.destroy();
            }

            const expenseByCategory = [];
            const colors = [];

            const categoryMap = {};
            accountData.categories.forEach(c => categoryMap[c.id] = c);

            Object.entries(statistics.byCategory).forEach(([catId, data]) => {
                if (data.expense > 0) {
                    const cat = categoryMap[catId] || { name: '未知', icon: '📦', color: '#D3D3D3' };
                    expenseByCategory.push({
                        name: cat.name,
                        icon: cat.icon,
                        value: data.expense,
                        color: cat.color
                    });
                    colors.push(cat.color);
                }
            });

            expenseByCategory.sort((a, b) => b.value - a.value);

            expensePieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: expenseByCategory.map(c => c.icon + ' ' + c.name),
                    datasets: [{
                        data: expenseByCategory.map(c => c.value),
                        backgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { boxWidth: 12, padding: 10, font: { size: 11 }, color: '#666' }
                        }
                    }
                }
            });
        }

        function renderTrendLineChart() {
            const ctx = document.getElementById('trendLineChart').getContext('2d');

            if (trendLineChart) {
                trendLineChart.destroy();
            }

            const months = Object.keys(statistics.byMonth).sort();
            const incomeData = months.map(m => statistics.byMonth[m].income);
            const expenseData = months.map(m => statistics.byMonth[m].expense);

            trendLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months.map(m => m.substring(5)),
                    datasets: [
                        {
                            label: '收入',
                            data: incomeData,
                            borderColor: '#666',
                            backgroundColor: 'rgba(102, 102, 102, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '支出',
                            data: expenseData,
                            borderColor: '#333',
                            backgroundColor: 'rgba(51, 51, 51, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { color: '#666' } }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#999' }, grid: { color: '#f0f0f0' } },
                        x: { ticks: { color: '#999' }, grid: { color: '#f0f0f0' } }
                    }
                }
            });
        }

        function renderComparisonBarChart() {
            const ctx = document.getElementById('comparisonBarChart').getContext('2d');

            if (comparisonBarChart) {
                comparisonBarChart.destroy();
            }

            const months = Object.keys(statistics.byMonth).sort().slice(-6);
            const incomeData = months.map(m => statistics.byMonth[m].income);
            const expenseData = months.map(m => statistics.byMonth[m].expense);

            comparisonBarChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months.map(m => m.substring(5)),
                    datasets: [
                        {
                            label: '收入',
                            data: incomeData,
                            backgroundColor: '#666'
                        },
                        {
                            label: '支出',
                            data: expenseData,
                            backgroundColor: '#333'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#999' }, grid: { color: '#f0f0f0' } },
                        x: { ticks: { color: '#999' }, grid: { color: '#f0f0f0' } }
                    }
                }
            });
        }

        function renderCategoryTable() {
            const tableEl = document.getElementById('categoryTable');
            const categoryMap = {};
            accountData.categories.forEach(c => categoryMap[c.id] = c);

            const categoryData = [];
            Object.entries(statistics.byCategory).forEach(([catId, data]) => {
                if (data.expense > 0 || data.income > 0) {
                    const cat = categoryMap[catId] || { name: '未知', icon: '📦', color: '#D3D3D3' };
                    categoryData.push({
                        ...cat,
                        id: catId,
                        expense: data.expense,
                        income: data.income,
                        count: data.count
                    });
                }
            });

            categoryData.sort((a, b) => (b.expense + b.income) - (a.expense + a.income));

            if (categoryData.length === 0) {
                tableEl.innerHTML = '<div class="empty-state" style="padding:30px;"><div class="empty-state-icon">📦</div><p>暂无数据</p></div>';
                return;
            }

            let html = '<table class="category-table"><thead><tr><th>分类</th><th>支出</th><th>收入</th></tr></thead><tbody>';
            categoryData.forEach(cat => {
                html += `
                    <tr>
                        <td>
                            <div class="category-name">
                                <div class="category-dot" style="background: ${cat.color};"></div>
                                ${cat.icon} ${cat.name}
                            </div>
                        </td>
                        <td style="color: #333;">¥${cat.expense.toFixed(2)}</td>
                        <td style="color: #666;">¥${cat.income.toFixed(2)}</td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            tableEl.innerHTML = html;
        }

        loadStatistics();
    </script>
</body>
</html>
