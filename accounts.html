<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 账户管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }
        .main-content { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 15px;
            padding-bottom: 80px;
        }
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #999; 
            margin-bottom: 15px; 
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .account-card { 
            display: flex; 
            align-items: center; 
            padding: 16px; 
            border-radius: 18px; 
            margin-bottom: 10px; 
            gap: 15px; 
            background: #fafafa;
            border: 1px solid #f5f5f5;
        }
        .account-icon { 
            width: 50px; 
            height: 50px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            background: #f5f5f5;
        }
        .account-info { flex: 1; }
        .account-name { 
            font-size: 15px; 
            font-weight: 500; 
            color: #333;
        }
        .account-type { 
            font-size: 12px; 
            color: #999; 
            margin-top: 3px;
        }
        .account-balance { 
            font-size: 17px; 
            font-weight: 500; 
            color: #333;
        }
        .account-balance.positive { color: #333; }
        .account-balance.negative { color: #666; }
        .account-actions { display: flex; gap: 8px; }
        .action-btn { 
            padding: 8px 14px; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 12px; 
            background: #f5f5f5;
            color: #666;
        }
        .action-btn.delete { 
            background: #fafafa; 
            color: #666;
        }
        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
            width: 100%; 
            padding: 16px;
        }
        .ink-btn-secondary { 
            background: #f5f5f5; 
            color: #333; 
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 14px; 
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .form-row { 
            display: flex; 
            gap: 12px; 
        }
        .form-row .form-group { flex: 1; }
        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 20px; 
        }
        .btn-group .ink-btn { flex: 1; }
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(0,0,0,0.4); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
        }
        .modal.show { display: flex; }
        .modal-content { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            width: 90%; 
            max-width: 450px; 
            max-height: 90vh; 
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .modal-title { 
            font-size: 16px; 
            font-weight: 500; 
            letter-spacing: 2px;
        }
        .modal-close { 
            background: none; 
            border: none; 
            font-size: 28px; 
            cursor: pointer; 
            color: #999; 
            line-height: 1;
        }
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .toast.show { opacity: 1; }
        .empty-state { 
            text-align: center; 
            padding: 40px 20px; 
            color: #ccc; 
        }
        .empty-state-icon { 
            font-size: 48px; 
            margin-bottom: 10px; 
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">账户管理</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="categories.html">📂 分类</a>
            <a href="statistics.html">📊 统计</a>
        </div>
    </div>

    <div class="main-content">
        <div class="ink-card">
            <div class="ink-title">
                <span>📋 账户列表</span>
            </div>
            <div id="accountList"></div>
            <button class="ink-btn ink-btn-primary" onclick="openAddModal()">➕ 添加账户</button>
        </div>

        <div class="ink-card">
            <div class="ink-title">💱 账户转账</div>
            <div class="form-row">
                <div class="form-group">
                    <label>从</label>
                    <select id="fromAccount"></select>
                </div>
                <div class="form-group">
                    <label>到</label>
                    <select id="toAccount"></select>
                </div>
            </div>
            <div class="form-group">
                <label>金额</label>
                <input type="number" id="transferAmount" placeholder="0.00" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="transferRemark" placeholder="可选">
            </div>
            <button class="ink-btn ink-btn-primary" onclick="doTransfer()">确认转账</button>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">添加账户</span>
                <button class="modal-close" onclick="closeAddModal()">×</button>
            </div>
            <form id="addAccountForm">
                <div class="form-group">
                    <label>账户名称</label>
                    <input type="text" id="newAccountName" placeholder="例如：我的银行卡" required>
                </div>
                <div class="form-group">
                    <label>账户类型</label>
                    <select id="newAccountType">
                        <option value="cash">💵 现金</option>
                        <option value="card">🏦 银行卡</option>
                        <option value="credit">💳 信用卡</option>
                        <option value="alipay">💙 支付宝</option>
                        <option value="wechat">💚 微信钱包</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>初始余额</label>
                    <input type="number" id="newAccountBalance" placeholder="0.00" step="0.01" value="0">
                </div>
                <div class="btn-group">
                    <button type="button" class="ink-btn ink-btn-secondary" onclick="closeAddModal()">取消</button>
                    <button type="submit" class="ink-btn ink-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">编辑账户</span>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <form id="editAccountForm">
                <input type="hidden" id="editAccountId">
                <div class="form-group">
                    <label>账户名称</label>
                    <input type="text" id="editAccountName" required>
                </div>
                <div class="form-group">
                    <label>账户类型</label>
                    <select id="editAccountType">
                        <option value="cash">💵 现金</option>
                        <option value="card">🏦 银行卡</option>
                        <option value="credit">💳 信用卡</option>
                        <option value="alipay">💙 支付宝</option>
                        <option value="wechat">💚 微信钱包</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="editAccountStatus">
                        <option value="active">启用</option>
                        <option value="disabled">禁用</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="button" class="ink-btn ink-btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="ink-btn ink-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;

        const typeIcons = {
            cash: '💵',
            card: '🏦',
            credit: '💳',
            alipay: '💙',
            wechat: '💚'
        };

        const typeNames = {
            cash: '现金',
            card: '银行卡',
            credit: '信用卡',
            alipay: '支付宝',
            wechat: '微信钱包'
        };

        async function loadAccount() {
            try {
                accountData = await api.get(`/account/${currentAccountId}`);
                renderAccounts();
                updateTransferSelects();
            } catch (err) {
                showToast('加载失败');
            }
        }

        function renderAccounts() {
            const listEl = document.getElementById('accountList');
            listEl.innerHTML = '';

            if (accountData.accounts.length === 0) {
                listEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💳</div><div>暂无账户</div></div>';
                return;
            }

            accountData.accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.style.opacity = acc.status === 'disabled' ? '0.5' : '1';
                card.innerHTML = `
                    <div class="account-icon">${typeIcons[acc.type] || '💰'}</div>
                    <div class="account-info">
                        <div class="account-name">${acc.name}</div>
                        <div class="account-type">${typeNames[acc.type] || acc.type}</div>
                    </div>
                    <div class="account-balance ${acc.balance >= 0 ? 'positive' : 'negative'}">¥${acc.balance.toFixed(2)}</div>
                    <div class="account-actions">
                        <button class="action-btn" onclick="openEditModal('${acc.id}')">编辑</button>
                        ${accountData.accounts.length > 1 ? `<button class="action-btn delete" onclick="deleteAccount('${acc.id}')">删除</button>` : ''}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function updateTransferSelects() {
            const fromSelect = document.getElementById('fromAccount');
            const toSelect = document.getElementById('toAccount');
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';

            accountData.accounts.filter(a => a.status === 'active').forEach(acc => {
                fromSelect.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
                toSelect.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
            });
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('addAccountForm').reset();
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        function openEditModal(id) {
            const acc = accountData.accounts.find(a => a.id === id);
            if (!acc) return;

            document.getElementById('editModal').classList.add('show');
            document.getElementById('editAccountId').value = id;
            document.getElementById('editAccountName').value = acc.name;
            document.getElementById('editAccountType').value = acc.type;
            document.getElementById('editAccountStatus').value = acc.status;
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        document.getElementById('addAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const account = {
                name: document.getElementById('newAccountName').value,
                type: document.getElementById('newAccountType').value,
                balance: parseFloat(document.getElementById('newAccountBalance').value) || 0
            };

            try {
                await api.post('/accounts', { accountId: currentAccountId, account });
                showToast('账户已添加');
                closeAddModal();
                loadAccount();
            } catch (err) {
                showToast('添加失败');
            }
        });

        document.getElementById('editAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('editAccountId').value;
            const account = {
                name: document.getElementById('editAccountName').value,
                type: document.getElementById('editAccountType').value,
                status: document.getElementById('editAccountStatus').value
            };

            try {
                await api.put(`/accounts/${id}`, { accountId: currentAccountId, account });
                showToast('账户已更新');
                closeEditModal();
                loadAccount();
            } catch (err) {
                showToast('更新失败');
            }
        });

        async function deleteAccount(id) {
            if (!confirm('确定删除该账户？')) return;

            try {
                await api.delete(`/accounts/${id}`, { accountId: currentAccountId });
                showToast('账户已删除');
                loadAccount();
            } catch (err) {
                showToast('删除失败');
            }
        }

        async function doTransfer() {
            const fromId = document.getElementById('fromAccount').value;
            const toId = document.getElementById('toAccount').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const remark = document.getElementById('transferRemark').value;

            if (fromId === toId) {
                showToast('转出和转入账户不能相同');
                return;
            }

            if (!amount || amount <= 0) {
                showToast('请输入有效金额');
                return;
            }

            try {
                await api.post('/transfer', {
                    accountId: currentAccountId,
                    fromAccountId: fromId,
                    toAccountId: toId,
                    amount,
                    remark
                });
                showToast('转账成功');
                document.getElementById('transferAmount').value = '';
                document.getElementById('transferRemark').value = '';
                loadAccount();
            } catch (err) {
                showToast('转账失败');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadAccount();
    </script>
</body>
</html>
