<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 分类管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }
        .main-content { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 15px;
            padding-bottom: 100px;
        }
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #999; 
            margin-bottom: 15px; 
            letter-spacing: 4px;
        }
        .type-tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .type-tab { flex: 1; padding: 14px; text-align: center; border-radius: 14px; cursor: pointer; font-size: 15px; background: #f5f5f5; color: #666; transition: all 0.3s; }
        .type-tab.active { background: #333; color: #fff; }
        .category-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .category-item { display: flex; align-items: center; padding: 16px; border-radius: 16px; gap: 12px; cursor: pointer; transition: transform 0.2s; background: #fafafa; border: 1px solid #f0f0f0; }
        .category-item:hover { transform: scale(1.02); background: #f5f5f5; }
        .category-icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .category-name { font-size: 15px; font-weight: 500; color: #333; flex: 1; }
        .category-badge { font-size: 11px; padding: 4px 10px; border-radius: 10px; color: #fff; letter-spacing: 1px; }
        .category-badge.system { background: #666; }
        .category-badge.custom { background: #333; }
        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
            width: 100%; 
            padding: 16px;
            margin-top: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 14px; 
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .icon-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
        .icon-option { width: 44px; height: 44px; border: 2px solid #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: all 0.2s; }
        .icon-option:hover { border-color: #333; background: #fafafa; }
        .icon-option.selected { border-color: #333; background: #f5f5f5; }
        .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: #333; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group .ink-btn { flex: 1; }
        .ink-btn-secondary { background: #f5f5f5; color: #333; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 24px; padding: 25px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 500; letter-spacing: 2px; color: #333; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #ccc; line-height: 1; }
        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .toast.show { opacity: 1; }
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">分类管理</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="budget.html">📊 预算</a>
            <a href="statistics.html">📈 统计</a>
        </div>
    </div>

    <div class="main-content">
        <div class="ink-card">
            <div class="type-tabs">
                <div class="type-tab active" data-type="expense" onclick="switchType('expense')">💸 支出分类</div>
                <div class="type-tab" data-type="income" onclick="switchType('income')">💰 收入分类</div>
            </div>
            <div class="category-list" id="categoryList"></div>
            <button class="ink-btn ink-btn-primary" onclick="openAddModal()">➕ 添加分类</button>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">添加分类</span>
                <button class="modal-close" onclick="closeAddModal()">×</button>
            </div>
            <form id="addCategoryForm">
                <div class="form-group">
                    <label>分类名称（古风名）</label>
                    <input type="text" id="newCategoryName" placeholder="例如：烟火食事" required>
                </div>
                <div class="form-group">
                    <label>现代解释（可选）</label>
                    <input type="text" id="newCategoryModernName" placeholder="例如：餐饮">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="newCategoryType">
                        <option value="expense">💸 支出</option>
                        <option value="income">💰 收入</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <div class="icon-picker" id="iconPicker"></div>
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <div class="color-picker" id="colorPicker"></div>
                </div>
                <div class="btn-group">
                    <button type="button" class="ink-btn ink-btn-secondary" onclick="closeAddModal()">取消</button>
                    <button type="submit" class="ink-btn ink-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">编辑分类</span>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <form id="editCategoryForm">
                <input type="hidden" id="editCategoryId">
                <div class="form-group">
                    <label>分类名称（古风名）</label>
                    <input type="text" id="editCategoryName" required>
                </div>
                <div class="form-group">
                    <label>现代解释（可选）</label>
                    <input type="text" id="editCategoryModernName">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <div class="icon-picker" id="editIconPicker"></div>
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <div class="color-picker" id="editColorPicker"></div>
                </div>
                <div class="btn-group">
                    <button type="button" class="ink-btn ink-btn-secondary" onclick="closeEditModal()">取消</button>
                    <button type="submit" class="ink-btn ink-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let currentType = 'expense';
        let selectedIcon = '🎋';
        let selectedColor = '#4D4D4D';

        const icons = ['🍵', '🏮', '🏷️', '🎭', '🏯', '💚', '📜', '🥇', '📊', '🎋', '🎋', '🎴', '🎐', '🎑', '🎎', '🎏', '🎐', '🎏', '🎐', '🎎', '🎋', '🎐', '🎑', '🎏', '🎎', '🎐', '🎑', '🎏', '🎎', '🎋', '🎐', '🎑'];

        const colors = ['#4A4A4A', '#6B5B4F', '#5D5149', '#3D3D3D', '#7A6B5D', '#5E6B5D', '#4C5866', '#8B7355'];

        function formatCategoryName(cat) {
            if (cat.modernName && cat.modernName !== cat.name) {
                return `<span>${cat.name}<span style="font-size: 0.85em; opacity: 0.65; margin-left: 6px; font-family: system-ui;">(${cat.modernName})</span></span>`;
            }
            return cat.name;
        }

        async function loadAccount() {
            try {
                accountData = await api.get(`/account/${currentAccountId}`);
                renderCategories();
                renderIconPickers();
                renderColorPickers();
            } catch (err) {
                showToast('加载失败');
            }
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.type-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === type);
            });
            renderCategories();
        }

        function renderCategories() {
            const listEl = document.getElementById('categoryList');
            listEl.innerHTML = '';

            const filtered = accountData.categories.filter(c => c.type === currentType);

            filtered.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.style.background = cat.color + '15';
                item.onclick = () => openEditModal(cat.id);
                item.innerHTML = `
                    <div class="category-icon" style="background: ${cat.color}25;">${cat.icon}</div>
                    <span class="category-name">${formatCategoryName(cat)}</span>
                    <span class="category-badge ${cat.custom ? 'custom' : 'system'}">${cat.custom ? '自定义' : '系统'}</span>
                `;
                listEl.appendChild(item);
            });
        }

        function renderIconPickers() {
            ['iconPicker', 'editIconPicker'].forEach(pickerId => {
                const picker = document.getElementById(pickerId);
                picker.innerHTML = '';
                icons.forEach(icon => {
                    const option = document.createElement('div');
                    option.className = 'icon-option';
                    option.textContent = icon;
                    option.onclick = () => selectIcon(pickerId, icon);
                    picker.appendChild(option);
                });
            });
        }

        function renderColorPickers() {
            ['colorPicker', 'editColorPicker'].forEach(pickerId => {
                const picker = document.getElementById(pickerId);
                picker.innerHTML = '';
                colors.forEach(color => {
                    const option = document.createElement('div');
                    option.className = 'color-option';
                    option.style.background = color;
                    option.onclick = () => selectColor(pickerId, color);
                    picker.appendChild(option);
                });
            });
        }

        function selectIcon(pickerId, icon) {
            const picker = document.getElementById(pickerId);
            picker.querySelectorAll('.icon-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            if (pickerId === 'iconPicker') {
                selectedIcon = icon;
            } else {
                document.getElementById('editIconValue')?.value || (window.editIconValue = icon);
            }
        }

        function selectColor(pickerId, color) {
            const picker = document.getElementById(pickerId);
            picker.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            event.target.classList.add('selected');
            if (pickerId === 'colorPicker') {
                selectedColor = color;
            } else {
                document.getElementById('editColorValue')?.value || (window.editColorValue = color);
            }
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('addCategoryForm').reset();
            document.getElementById('newCategoryType').value = currentType;
            selectedIcon = '📦';
            selectedColor = '#666';

            const firstIcon = document.querySelector('#iconPicker .icon-option');
            const firstColor = document.querySelector('#colorPicker .color-option');
            if (firstIcon) firstIcon.classList.add('selected');
            if (firstColor) firstColor.classList.add('selected');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        function openEditModal(id) {
            const cat = accountData.categories.find(c => c.id === id);
            if (!cat) return;

            document.getElementById('editModal').classList.add('show');
            document.getElementById('editCategoryId').value = id;
            document.getElementById('editCategoryName').value = cat.name;
            document.getElementById('editCategoryModernName').value = cat.modernName || '';
            window.editIconValue = cat.icon;
            window.editColorValue = cat.color;

            const iconPicker = document.getElementById('editIconPicker');
            iconPicker.querySelectorAll('.icon-option').forEach(opt => {
                opt.classList.toggle('selected', opt.textContent === cat.icon);
            });

            const colorPicker = document.getElementById('editColorPicker');
            colorPicker.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('selected', opt.style.background === cat.color);
            });
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedIconEl = document.querySelector('#iconPicker .icon-option.selected');
            const selectedColorEl = document.querySelector('#colorPicker .color-option.selected');

            const category = {
                name: document.getElementById('newCategoryName').value,
                modernName: document.getElementById('newCategoryModernName').value,
                icon: selectedIconEl ? selectedIconEl.textContent : '📦',
                color: selectedColorEl ? selectedColorEl.style.background : '#666',
                type: document.getElementById('newCategoryType').value
            };

            try {
                await api.post('/categories', { accountId: currentAccountId, category });
                showToast('分类已添加');
                closeAddModal();
                loadAccount();
            } catch (err) {
                showToast('添加失败');
            }
        });

        document.getElementById('editCategoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('editCategoryId').value;
            const selectedIconEl = document.querySelector('#editIconPicker .icon-option.selected');
            const selectedColorEl = document.querySelector('#editColorPicker .color-option.selected');

            const category = {
                name: document.getElementById('editCategoryName').value,
                modernName: document.getElementById('editCategoryModernName').value,
                icon: selectedIconEl ? selectedIconEl.textContent : '📦',
                color: selectedColorEl ? selectedColorEl.style.background : '#666'
            };

            try {
                await api.put(`/categories/${id}`, { accountId: currentAccountId, category });
                showToast('分类已更新');
                closeEditModal();
                loadAccount();
            } catch (err) {
                showToast('更新失败');
            }
        });

        async function deleteCategory(id) {
            if (!confirm('确定删除该分类？')) return;

            try {
                await api.delete(`/categories/${id}`, { accountId: currentAccountId });
                showToast('分类已删除');
                loadAccount();
            } catch (err) {
                showToast('删除失败');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadAccount();
    </script>
</body>
</html>
