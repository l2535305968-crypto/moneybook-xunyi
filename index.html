<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 记账本</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 登录界面 */
        .login-section { 
            display: none; 
            min-height: 100vh; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            position: relative;
        }
        .login-section.show { display: flex; }
        
        .login-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
        }
        
        .login-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(120, 180, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(200, 150, 255, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(100, 200, 150, 0.04) 0%, transparent 60%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, -10px); }
            50% { transform: translate(-10px, 10px); }
            75% { transform: translate(10px, 10px); }
        }
        
        .ink-login-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; 
            padding: 50px 40px; 
            text-align: center; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }
        .ink-login-logo { 
            font-size: 42px; 
            margin-bottom: 10px; 
            letter-spacing: 12px;
            font-weight: 300;
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .ink-login-subtitle { 
            color: rgba(255, 255, 255, 0.6); 
            margin-bottom: 40px; 
            font-size: 14px;
            letter-spacing: 4px;
        }
        .ink-input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 14px; 
            font-size: 15px; 
            margin-bottom: 18px; 
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            transition: all 0.3s ease;
        }
        .ink-input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .ink-input:focus { 
            outline: none; 
            border-color: rgba(255, 255, 255, 0.3); 
            background: rgba(255, 255, 255, 0.06);
        }
        .ink-login-btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #3a3a5c 0%, #2a2a4c 100%); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 14px; 
            font-size: 15px; 
            cursor: pointer; 
            letter-spacing: 3px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        .ink-login-btn:hover { 
            background: linear-gradient(135deg, #4a4a6c 0%, #3a3a5c 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .ink-login-btn.alt { 
            background: rgba(255, 255, 255, 0.05); 
            color: rgba(255, 255, 255, 0.8);
        }
        .login-hint { 
            margin-top: 25px; 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.4); 
        }
        .divider { 
            margin: 30px 0; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
            position: relative;
        }
        .divider::before {
            content: '或';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            padding: 0 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* 主界面 */
        .ink-header { 
            background: rgba(15, 15, 30, 0.8); 
            backdrop-filter: blur(20px);
            color: #fff; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title { 
            font-size: 24px; 
            font-weight: 300; 
            letter-spacing: 6px;
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .account-selector { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            padding: 10px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            cursor: pointer;
        }
        .header-links { 
            display: flex; 
            gap: 20px; 
            margin-top: 15px; 
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .header-links a { 
            color: rgba(255, 255, 255, 0.6); 
            text-decoration: none; 
            font-size: 13px; 
            transition: color 0.3s ease;
        }
        .header-links a:hover { color: #fff; }

        .main-content { 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 20px 20px 100px;
            position: relative;
            z-index: 1;
        }

        /* 星图区域 */
        .star-map {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
        }
        
        .connection-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(150, 200, 255, 0.3), transparent);
            transform-origin: left center;
        }
        
        .star-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 10;
        }
        
        .star-node:hover {
            transform: scale(1.1);
        }
        
        .star-glow {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 180, 255, 0.2) 0%, transparent 70%);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        .star-body {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            backdrop-filter: blur(10px);
            z-index: 1;
        }
        
        .star-label {
            margin-top: 8px;
            text-align: center;
        }
        
        .star-name {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }
        
        .star-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* 位置安排 */
        .star-node:nth-child(1) { top: 10%; left: 50%; transform: translateX(-50%); }
        .star-node:nth-child(2) { top: 30%; left: 15%; }
        .star-node:nth-child(3) { top: 30%; right: 15%; }
        .star-node:nth-child(4) { top: 60%; left: 25%; }
        .star-node:nth-child(5) { top: 60%; right: 25%; }
        .star-node:nth-child(6) { top: 85%; left: 50%; transform: translateX(-50%); }

        /* 水墨卡片 */
        .ink-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; 
            padding: 30px; 
            margin-bottom: 20px; 
            backdrop-filter: blur(10px);
        }
        .ink-title { 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.5); 
            margin-bottom: 10px; 
            letter-spacing: 3px;
        }
        .ink-balance { 
            font-size: 48px; 
            font-weight: 300; 
            color: #fff; 
            line-height: 1.2;
            letter-spacing: -1px;
        }
        .ink-balance.positive { color: #9effc0; }
        .ink-balance.negative { color: #ff9e9e; }
        .ink-balance::before { 
            content: '¥ '; 
            font-size: 24px; 
            opacity: 0.5; 
            color: #fff;
        }

        .account-chips { 
            display: flex; 
            gap: 10px; 
            margin-top: 25px; 
            flex-wrap: wrap; 
        }
        .ink-chip { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px; 
            border-radius: 50px; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.7);
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        /* 快速记账区域 */
        .quick-add-section {
            margin-bottom: 20px;
        }
        .type-toggle { 
            display: flex; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            padding: 6px; 
            margin-bottom: 25px;
        }
        .type-btn { 
            flex: 1; 
            padding: 14px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 15px; 
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        .type-btn.active { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.5); 
            margin-bottom: 8px; 
            letter-spacing: 2px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            font-size: 15px; 
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
        }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
        .form-group select option { background: #1a1a2e; color: #fff; }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: rgba(255, 255, 255, 0.3); 
            background: rgba(255, 255, 255, 0.06);
        }
        .form-row { 
            display: flex; 
            gap: 12px; 
        }
        .form-row .form-group { flex: 1; }
        .amount-input { 
            font-size: 28px !important; 
            font-weight: 300; 
            text-align: center; 
            padding: 18px !important;
            letter-spacing: 2px;
        }
        .ink-btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #3a3a5c 0%, #2a2a4c 100%); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 8px;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        .ink-btn:hover { 
            background: linear-gradient(135deg, #4a4a6c 0%, #3a3a5c 100%);
            transform: translateY(-2px);
        }
        .ink-btn.secondary { 
            background: rgba(255, 255, 255, 0.05); 
            color: rgba(255, 255, 255, 0.8);
        }

        /* 记录列表 */
        .records-section {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .section-header { 
            font-size: 15px; 
            margin-bottom: 20px; 
            color: rgba(255, 255, 255, 0.9); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            letter-spacing: 3px;
        }
        .record-list { max-height: 500px; overflow-y: auto; }
        .record-item { 
            display: flex; 
            align-items: center; 
            padding: 16px 0; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            gap: 16px; 
        }
        .record-item:last-child { border-bottom: none; }
        .record-icon { 
            width: 46px; 
            height: 46px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .record-info { flex: 1; }
        .record-category { font-size: 15px; color: #fff; }
        .record-remark { font-size: 12px; color: rgba(255, 255, 255, 0.5); margin-top: 3px; }
        .record-amount { 
            font-size: 16px; 
            font-weight: 400; 
            letter-spacing: 1px;
        }
        .record-amount.expense { color: #ff9e9e; }
        .record-amount.income { color: #9effc0; }
        .record-amount::before { content: '¥ '; font-size: 12px; opacity: 0.5; }
        .record-date { font-size: 12px; color: rgba(255, 255, 255, 0.4); }
        .record-delete { 
            background: none; 
            border: none; 
            color: rgba(255, 255, 255, 0.3); 
            cursor: pointer; 
            padding: 5px; 
            font-size: 18px; 
        }
        .record-delete:hover { color: rgba(255, 255, 255, 0.6); }

        .empty-state { text-align: center; padding: 50px 20px; color: rgba(255, 255, 255, 0.4); }
        .empty-state-icon { font-size: 52px; margin-bottom: 12px; opacity: 0.6; }

        /* 底栏 */
        .ink-tab-bar { 
            display: flex; 
            background: rgba(15, 15, 30, 0.95); 
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
            z-index: 200;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: rgba(255, 255, 255, 0.4); 
            font-size: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { 
            color: #fff; 
        }
        .ink-tab-icon { 
            font-size: 22px; 
            opacity: 0.9; 
        }

        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            color: #fff; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .toast.show { opacity: 1; }

        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .ink-tab-bar { position: static; border-top: none; padding-bottom: 8px; }
            .main-content { padding-bottom: 40px; }
        }
    </style>
</head>
<body>
    <div class="login-section show" id="loginSection">
        <div class="login-bg"></div>
        <div class="ink-login-card">
            <div class="ink-login-logo">墨记</div>
            <div class="ink-login-subtitle">静心记账 · 了然于心</div>
            
            <div style="margin-bottom: 15px;">
                <div style="font-size: 13px; margin-bottom: 10px; color: rgba(255,255,255,0.5); text-align: left; letter-spacing: 2px;">已有账户</div>
                <input type="text" id="accountIdInput" class="ink-input" placeholder="输入账户ID或账户名称">
                <button class="ink-login-btn" onclick="loginWithAccountId()">登录</button>
            </div>
            
            <div class="divider"></div>
            
            <div>
                <div style="font-size: 13px; margin-bottom: 10px; color: rgba(255,255,255,0.5); text-align: left; letter-spacing: 2px;">开立新账户</div>
                <input type="text" id="accountNameInput" class="ink-input" placeholder="请告知您的姓名" maxlength="20">
                <button class="ink-login-btn alt" onclick="requestAccount()">申请</button>
                <div class="login-hint">账户需经审批后启用</div>
            </div>
        </div>
    </div>

    <div class="ink-header" id="mainHeader" style="display: none;">
        <div class="header-top">
            <div class="header-title">墨记</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select class="account-selector" id="accountSelector">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        <div class="header-links">
            <a href="accounts.html">账户</a>
            <a href="categories.html">分类</a>
            <a href="statistics.html">统计</a>
            <a href="groups.html">群组</a>
            <a href="admin.html">管理</a>
        </div>
    </div>

    <div class="main-content" id="mainContent" style="display: none;">
        <div class="ink-card">
            <div class="ink-title">总资产</div>
            <div class="ink-balance positive" id="totalBalance">0.00</div>
            <div class="account-chips" id="accountBalances"></div>
        </div>

        <div class="star-map">
            <svg class="connection-lines">
                <line class="connection-line" x1="50%" y1="15%" x2="20%" y2="35%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
                <line class="connection-line" x1="50%" y1="15%" x2="80%" y2="35%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
                <line class="connection-line" x1="20%" y1="35%" x2="30%" y2="65%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
                <line class="connection-line" x1="80%" y1="35%" x2="70%" y2="65%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
                <line class="connection-line" x1="30%" y1="65%" x2="50%" y2="90%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
                <line class="connection-line" x1="70%" y1="65%" x2="50%" y2="90%" stroke="rgba(150,200,255,0.2)" stroke-width="2"/>
            </svg>
            
            <div class="star-node" onclick="showQuickAdd()">
                <div class="star-glow"></div>
                <div class="star-body">✨</div>
                <div class="star-label">
                    <div class="star-name">天枢</div>
                    <div class="star-desc">记一笔</div>
                </div>
            </div>
            
            <div class="star-node" onclick="window.location.href='statistics.html'">
                <div class="star-glow"></div>
                <div class="star-body">📊</div>
                <div class="star-label">
                    <div class="star-name">天璇</div>
                    <div class="star-desc">统计</div>
                </div>
            </div>
            
            <div class="star-node" onclick="window.location.href='groups.html'">
                <div class="star-glow"></div>
                <div class="star-body">👥</div>
                <div class="star-label">
                    <div class="star-name">天玑</div>
                    <div class="star-desc">群组</div>
                </div>
            </div>
            
            <div class="star-node" onclick="window.location.href='categories.html'">
                <div class="star-glow"></div>
                <div class="star-body">📂</div>
                <div class="star-label">
                    <div class="star-name">天权</div>
                    <div class="star-desc">分类</div>
                </div>
            </div>
            
            <div class="star-node" onclick="window.location.href='accounts.html'">
                <div class="star-glow"></div>
                <div class="star-body">💰</div>
                <div class="star-label">
                    <div class="star-name">玉衡</div>
                    <div class="star-desc">账户</div>
                </div>
            </div>
            
            <div class="star-node" onclick="window.location.href='admin.html'">
                <div class="star-glow"></div>
                <div class="star-body">⚙️</div>
                <div class="star-label">
                    <div class="star-name">开阳</div>
                    <div class="star-desc">管理</div>
                </div>
            </div>
        </div>

        <div class="ink-card quick-add-section" id="quickAddSection" style="display: none;">
            <div class="ink-title">记一笔</div>
            
            <div class="type-toggle">
                <div class="type-btn expense active" data-type="expense">支出</div>
                <div class="type-btn income" data-type="income">收入</div>
            </div>
            
            <form id="recordForm">
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="amountInput" class="amount-input" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="categorySelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>账户</label>
                        <select id="accountSelect" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" id="dateInput" required>
                    </div>
                    <div class="form-group">
                        <label>时间</label>
                        <input type="time" id="timeInput" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="remarkInput" placeholder="可留空">
                </div>
                <button type="submit" class="ink-btn">保存</button>
            </form>
        </div>

        <div class="records-section">
            <div class="section-header">
                <span>记录</span>
                <span id="recordsCount" style="font-size: 12px; color: rgba(255,255,255,0.4); font-weight: normal;"></span>
            </div>
            <div class="record-list" id="recordList"></div>
        </div>
    </div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item active">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="groups.html" class="ink-tab-item">
            <span class="ink-tab-icon">👥</span>
            <span>群组</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="categories.html" class="ink-tab-item">
            <span class="ink-tab-icon">📂</span>
            <span>分类</span>
        </a>
        <a href="admin.html" class="ink-tab-item">
            <span class="ink-tab-icon">⚙️</span>
            <span>管理</span>
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let currentType = 'expense';
        let currentMonth = new Date();
        let selectedDate = null;

        function generateId(prefix) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = prefix + '_';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showLogin() {
            document.getElementById('loginSection').classList.add('show');
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        function showMain() {
            document.getElementById('loginSection').classList.remove('show');
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('mainContent').style.display = 'block';
        }

        function showQuickAdd() {
            const section = document.getElementById('quickAddSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            if (section.style.display === 'block') {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function loginWithAccountId() {
            const accountInput = document.getElementById('accountIdInput').value.trim();
            
            if (!accountInput) {
                showToast('请输入账户ID或名称');
                return;
            }

            let accountId = accountInput;
            
            try {
                if (!accountInput.startsWith('acc_')) {
                    const searchResult = await api.get(`/api/account/find?name=${encodeURIComponent(accountInput)}`);
                    if (searchResult && searchResult.id) {
                        accountId = searchResult.id;
                        localStorage.setItem('accountName', searchResult.name);
                    }
                }
                
                currentAccountId = accountId;
                localStorage.setItem('accountId', currentAccountId);
                
                await loadAccount();
                showToast('登录成功');
            } catch (err) {
                showToast('账户不存在，请检查');
                currentAccountId = null;
                localStorage.removeItem('accountId');
                localStorage.removeItem('accountName');
            }
        }

        async function requestAccount() {
            const accountName = document.getElementById('accountNameInput').value.trim();
            
            if (!accountName) {
                showToast('请告知您的姓名');
                return;
            }

            try {
                const requestId = generateId('req');
                const requestData = {
                    id: requestId,
                    name: accountName,
                    status: 'pending',
                    requestTime: new Date().toISOString()
                };

                let pendingRequests = [];
                try {
                    const saved = localStorage.getItem('pendingRequests');
                    if (saved) pendingRequests = JSON.parse(saved);
                } catch (e) {}

                pendingRequests.push(requestData);
                localStorage.setItem('pendingRequests', JSON.stringify(pendingRequests));

                showToast('申请已提交，请联系管理员');
                
            } catch (err) {
                showToast('提交失败，请稍后再试');
            }
        }

        async function loadAccount() {
            const urlParams = new URLSearchParams(window.location.search);
            const aidParam = urlParams.get('aid');

            if (aidParam) {
                currentAccountId = aidParam;
                localStorage.setItem('accountId', currentAccountId);
            }

            if (!currentAccountId) {
                showLogin();
                return;
            }

            document.title = '墨记 · 记账本';

            try {
                accountData = await api.get('/account/' + currentAccountId);
                
                if (accountData.name) {
                    localStorage.setItem('accountName', accountData.name);
                }
                
                showMain();
                initApp();
            } catch (err) {
                console.error('加载账户失败:', err);
                showLogin();
            }
        }

        function initApp() {
            updateAccountSelector();
            updateBalance();
            updateCategorySelect();
            updateAccountSelect();
            loadRecords();
            initDatePicker();
        }

        function updateAccountSelector() {
            const selector = document.getElementById('accountSelector');
            selector.innerHTML = '';
            accountData.accounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.id;
                option.textContent = `${acc.name} ¥${acc.balance.toFixed(2)}`;
                if (acc.id === currentAccountId) {
                    option.selected = true;
                }
                selector.appendChild(option);
            });
        }

        function updateBalance() {
            const total = accountData.accounts.reduce((sum, acc) => sum + acc.balance, 0);
            const balanceEl = document.getElementById('totalBalance');
            balanceEl.textContent = total.toFixed(2);
            balanceEl.className = `ink-balance ${total >= 0 ? 'positive' : 'negative'}`;

            const badgesEl = document.getElementById('accountBalances');
            badgesEl.innerHTML = '';
            accountData.accounts.forEach(acc => {
                const badge = document.createElement('div');
                badge.className = 'ink-chip';
                badge.innerHTML = `<span>${acc.name}</span><span>¥${acc.balance.toFixed(2)}</span>`;
                badgesEl.appendChild(badge);
            });
        }

        function updateCategorySelect() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = '';
            const filtered = accountData.categories.filter(c => c.type === currentType);
            filtered.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = `${cat.icon} ${cat.name}`;
                select.appendChild(option);
            });
        }

        function updateAccountSelect() {
            const select = document.getElementById('accountSelect');
            select.innerHTML = '';
            accountData.accounts.filter(a => a.status === 'active').forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.id;
                option.textContent = acc.name;
                select.appendChild(option);
            });
        }

        function initDatePicker() {
            const now = new Date();
            flatpickr('#dateInput', {
                locale: 'zh',
                dateFormat: 'Y-m-d',
                defaultDate: now,
                allowInput: true,
                theme: 'dark'
            });
            document.getElementById('timeInput').value = now.toTimeString().substring(0, 5);
        }

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                updateCategorySelect();
            });
        });

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amountInput').value);
            if (!amount || amount <= 0) {
                showToast('请输入金额');
                return;
            }

            const dateValue = document.getElementById('dateInput').value;
            const timeValue = document.getElementById('timeInput').value;
            const dateTime = new Date(`${dateValue}T${timeValue}`).toISOString();

            const record = {
                accountId: document.getElementById('accountSelect').value,
                categoryId: document.getElementById('categorySelect').value,
                amount: amount,
                type: currentType,
                date: dateTime,
                remark: document.getElementById('remarkInput').value,
                source: 'manual'
            };

            try {
                await api.post('/records', { accountId: currentAccountId, record });
                showToast('已保存');
                document.getElementById('recordForm').reset();
                initDatePicker();
                document.getElementById('quickAddSection').style.display = 'none';

                accountData = await api.get(`/account/${currentAccountId}`);
                updateBalance();
                loadRecords();
            } catch (err) {
                showToast('保存失败');
            }
        });

        async function loadRecords() {
            try {
                const records = await api.get(`/records/${currentAccountId}`);

                const startOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
                const endOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);

                const monthRecords = records.filter(r => {
                    const d = new Date(r.date);
                    return d >= startOfMonth && d <= endOfMonth;
                });

                document.getElementById('recordsCount').textContent = `本月 ${monthRecords.length} 条`;

                const listEl = document.getElementById('recordList');
                listEl.innerHTML = '';

                if (records.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <div>暂无记录</div>
                        </div>
                    `;
                    return;
                }

                const categoryMap = {};
                accountData.categories.forEach(c => categoryMap[c.id] = c);

                records.slice(0, 50).forEach(record => {
                    const cat = categoryMap[record.categoryId] || { icon: '📦', name: '未知' };
                    const date = new Date(record.date);
                    const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                    const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

                    const item = document.createElement('div');
                    item.className = 'record-item';
                    item.innerHTML = `
                        <div class="record-icon">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-category">${cat.name}</div>
                            <div class="record-remark">${record.remark || ''} · ${timeStr}</div>
                        </div>
                        <div>
                            <div class="record-amount ${record.type}">${record.type === 'income' ? '+' : '-'}${parseFloat(record.amount).toFixed(2)}</div>
                            <div class="record-date">${dateStr}</div>
                        </div>
                        <button class="record-delete" onclick="deleteRecord('${record.id}')">×</button>
                    `;
                    listEl.appendChild(item);
                });
            } catch (err) {
                console.error('加载记录失败:', err);
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除？')) return;

            try {
                await api.delete(`/records/${id}`, { accountId: currentAccountId });
                showToast('已删除');
                accountData = await api.get(`/account/${currentAccountId}`);
                updateBalance();
                loadRecords();
            } catch (err) {
                showToast('删除失败');
            }
        }

        document.getElementById('accountSelector').addEventListener('change', (e) => {
            window.location.href = `?aid=${e.target.value}`;
        });

        loadAccount();
    </script>
</body>
</html>
