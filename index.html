<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 记账本</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        /* 水墨装饰背景 */
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 水墨风格的配色 */
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .account-selector { 
            background: #f5f5f5; 
            border: none; 
            color: #333; 
            padding: 10px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            cursor: pointer;
        }
        .header-links { 
            display: flex; 
            gap: 20px; 
            margin-top: 15px; 
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }
        .header-links a { 
            color: #666; 
            text-decoration: none; 
            font-size: 13px; 
        }
        .header-links a:hover { color: #333; }

        .main-content { 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 20px;
        }

        /* 水墨风格卡片 */
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 14px; 
            color: #999; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
        }
        .ink-balance { 
            font-size: 48px; 
            font-weight: 300; 
            color: #333; 
            line-height: 1.2;
            letter-spacing: -1px;
        }
        .ink-balance.positive { color: #333; }
        .ink-balance.negative { color: #666; }
        .ink-balance::before { content: '¥ '; font-size: 24px; opacity: 0.6; }

        .account-chips { 
            display: flex; 
            gap: 10px; 
            margin-top: 25px; 
            flex-wrap: wrap; 
        }
        .ink-chip { 
            background: #f8f7f5; 
            padding: 10px 18px; 
            border-radius: 50px; 
            font-size: 13px; 
            color: #666;
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        /* 快速记账区域 */
        .quick-add-section {
            margin-bottom: 20px;
        }
        .type-toggle { 
            display: flex; 
            background: #f5f5f5; 
            border-radius: 16px; 
            padding: 6px; 
            margin-bottom: 25px;
        }
        .type-btn { 
            flex: 1; 
            padding: 14px; 
            text-align: center; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 15px; 
            color: #999;
            transition: all 0.3s ease;
        }
        .type-btn.active { 
            background: #fff; 
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            font-size: 15px; 
            background: #fafafa;
            color: #333;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .form-row { 
            display: flex; 
            gap: 12px; 
        }
        .form-row .form-group { flex: 1; }
        .amount-input { 
            font-size: 28px !important; 
            font-weight: 300; 
            text-align: center; 
            padding: 18px !important;
            letter-spacing: 2px;
        }
        .ink-btn { 
            width: 100%; 
            padding: 16px; 
            background: #333; 
            color: #fff; 
            border: none; 
            border-radius: 16px; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 8px;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        .ink-btn:hover { background: #444; }
        .ink-btn.secondary { 
            background: #f0f0f0; 
            color: #333;
        }

        /* 日历区域 */
        .calendar-section {
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .calendar-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        .calendar-nav { display: flex; gap: 8px; align-items: center; }
        .calendar-nav button { 
            background: #f5f5f5; 
            border: none; 
            padding: 10px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: #666;
        }
        .calendar-title { 
            font-size: 16px; 
            font-weight: 400; 
            letter-spacing: 2px;
        }
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; 
        }
        .calendar-day-header { 
            text-align: center; 
            font-size: 12px; 
            color: #ccc; 
            padding: 8px; 
            letter-spacing: 1px;
        }
        .calendar-day { 
            text-align: center; 
            padding: 12px 5px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            position: relative; 
            min-height: 55px; 
            color: #666;
            transition: all 0.2s ease;
        }
        .calendar-day:hover { background: #f8f7f5; }
        .calendar-day.today { 
            background: #333; 
            color: #fff; 
        }
        .calendar-day.selected { 
            background: #555; 
            color: #fff; 
        }
        .calendar-day.other-month { color: #ddd; }
        .day-expense { 
            font-size: 10px; 
            color: #666; 
            position: absolute; 
            bottom: 5px; 
            left: 50%; 
            transform: translateX(-50%); 
        }
        .day-income { 
            font-size: 10px; 
            color: #333; 
            position: absolute; 
            bottom: 18px; 
            left: 50%; 
            transform: translateX(-50%); 
        }

        /* 记录列表 */
        .records-section {
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .section-header { 
            font-size: 15px; 
            margin-bottom: 20px; 
            color: #333; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            letter-spacing: 2px;
        }
        .record-list { max-height: 500px; overflow-y: auto; }
        .record-item { 
            display: flex; 
            align-items: center; 
            padding: 16px 0; 
            border-bottom: 1px solid #f8f7f5; 
            gap: 16px; 
        }
        .record-item:last-child { border-bottom: none; }
        .record-icon { 
            width: 46px; 
            height: 46px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            background: #f8f7f5;
        }
        .record-info { flex: 1; }
        .record-category { font-size: 15px; color: #333; }
        .record-remark { font-size: 12px; color: #999; margin-top: 3px; }
        .record-amount { 
            font-size: 16px; 
            font-weight: 400; 
            letter-spacing: 1px;
        }
        .record-amount.expense { color: #333; }
        .record-amount.income { color: #666; }
        .record-amount::before { content: '¥ '; font-size: 12px; opacity: 0.5; }
        .record-date { font-size: 12px; color: #ccc; }
        .record-delete { 
            background: none; 
            border: none; 
            color: #ddd; 
            cursor: pointer; 
            padding: 5px; 
            font-size: 18px; 
        }
        .record-delete:hover { color: #999; }

        .empty-state { text-align: center; padding: 50px 20px; color: #ccc; }
        .empty-state-icon { font-size: 52px; margin-bottom: 12px; opacity: 0.6; }

        /* 登录界面 - 水墨风格 */
        .login-section { 
            display: none; 
            min-height: 100vh; 
            background: linear-gradient(180deg, #f8f7f5 0%, #f0f0f0 100%); 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .login-section.show { display: flex; }
        .ink-login-card { 
            background: #fff; 
            border-radius: 28px; 
            padding: 50px 40px; 
            text-align: center; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }
        .ink-login-logo { 
            font-size: 48px; 
            margin-bottom: 5px; 
            letter-spacing: 16px;
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            position: relative;
            display: inline-block;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.08);
        }
        .ink-login-logo::before,
        .ink-login-logo::after {
            content: '●';
            position: absolute;
            font-size: 12px;
            opacity: 0.25;
        }
        .ink-login-logo::before {
            top: -8px;
            left: -20px;
        }
        .ink-login-logo::after {
            bottom: -5px;
            right: -25px;
        }
        .ink-login-subtitle { 
            color: #999; 
            margin-bottom: 40px; 
            font-size: 14px;
            letter-spacing: 4px;
            position: relative;
            padding-top: 15px;
        }
        .ink-login-subtitle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.15), transparent);
        }
        .ink-input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 15px; 
            margin-bottom: 18px; 
            background: #fafafa;
            transition: all 0.3s ease;
        }
        .ink-input:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .ink-login-btn { 
            width: 100%; 
            padding: 16px; 
            background: #333; 
            color: #fff; 
            border: none; 
            border-radius: 14px; 
            font-size: 15px; 
            cursor: pointer; 
            letter-spacing: 3px;
            margin-top: 8px;
        }
        .ink-login-btn:hover { background: #444; }
        .ink-login-btn.alt { 
            background: #f5f5f5; 
            color: #333;
        }
        .login-hint { 
            margin-top: 25px; 
            font-size: 12px; 
            color: #ccc; 
        }
        .divider { 
            margin: 30px 0; 
            height: 1px; 
            background: #f5f5f5; 
            position: relative;
        }
        .divider::before {
            content: '或';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 0 15px;
            color: #ccc;
            font-size: 12px;
        }

        /* 底栏 */
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 22px; opacity: 0.9; }

        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 28px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .ink-tab-bar { position: static; border-top: none; padding-bottom: 8px; }
            .main-content { padding-bottom: 40px; }
        }
    </style>
</head>
<body>
    <div class="login-section show" id="loginSection">
        <div class="ink-login-card">
            <div class="ink-login-logo">墨记</div>
            <div class="ink-login-subtitle">静心记账 · 了然于心</div>
            
            <!-- 已有账户登录 -->
            <div style="margin-bottom: 15px;">
                <div style="font-size: 13px; margin-bottom: 10px; color: #999; text-align: left; letter-spacing: 2px;">已有账户</div>
                <input type="text" id="accountIdInput" class="ink-input" placeholder="输入账户ID或账户名称">
                <button class="ink-login-btn" onclick="loginWithAccountId()">登录</button>
            </div>
            
            <div class="divider"></div>
            
            <!-- 申请新账户 -->
            <div>
                <div style="font-size: 13px; margin-bottom: 10px; color: #999; text-align: left; letter-spacing: 2px;">开立新账户</div>
                <input type="text" id="accountNameInput" class="ink-input" placeholder="请告知您的姓名" maxlength="20">
                <button class="ink-login-btn alt" onclick="requestAccount()">申请</button>
                <div class="login-hint">账户需经审批后启用</div>
            </div>
        </div>
    </div>

    <div class="ink-header" id="mainHeader" style="display: none;">
        <div class="header-top">
            <div class="header-title">墨记</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select class="account-selector" id="accountSelector">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>
        <div class="header-links">
            <a href="accounts.html">账户</a>
            <a href="categories.html">分类</a>
            <a href="statistics.html">统计</a>
            <a href="groups.html">群组</a>
            <a href="admin.html">管理</a>
        </div>
    </div>

    <div class="main-content" id="mainContent" style="display: none;">
        <div class="ink-card">
            <div class="ink-title">总资产</div>
            <div class="ink-balance positive" id="totalBalance">0.00</div>
            <div class="account-chips" id="accountBalances"></div>
        </div>

        <div class="ink-card quick-add-section">
            <div class="ink-title">记一笔</div>
            
            <div class="type-toggle">
                <div class="type-btn expense active" data-type="expense">支出</div>
                <div class="type-btn income" data-type="income">收入</div>
            </div>
            
            <form id="recordForm">
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" id="amountInput" class="amount-input" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="categorySelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>账户</label>
                        <select id="accountSelect" required></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" id="dateInput" required>
                    </div>
                    <div class="form-group">
                        <label>时间</label>
                        <input type="time" id="timeInput" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="remarkInput" placeholder="可留空">
                </div>
                <button type="submit" class="ink-btn">保存</button>
            </form>
        </div>

        <div class="calendar-section">
            <div class="calendar-header">
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">◀</button>
                    <span class="calendar-title" id="calendarTitle">2026年4月</span>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <button onclick="goToToday()" style="background: #f5f5f5; border: none; padding: 8px 14px; border-radius: 10px; font-size: 12px; cursor: pointer; color: #666;">今天</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="records-section">
            <div class="section-header">
                <span>记录</span>
                <span id="recordsCount" style="font-size: 12px; color: #ccc; font-weight: normal;"></span>
            </div>
            <div class="record-list" id="recordList"></div>
        </div>
    </div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item active">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="groups.html" class="ink-tab-item">
            <span class="ink-tab-icon">👥</span>
            <span>群组</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="categories.html" class="ink-tab-item">
            <span class="ink-tab-icon">📂</span>
            <span>分类</span>
        </a>
        <a href="admin.html" class="ink-tab-item">
            <span class="ink-tab-icon">⚙️</span>
            <span>管理</span>
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let currentType = 'expense';
        let currentMonth = new Date();
        let selectedDate = null;

        function generateId(prefix) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = prefix + '_';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showLogin() {
            document.getElementById('loginSection').classList.add('show');
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
        }

        function showMain() {
            document.getElementById('loginSection').classList.remove('show');
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('mainContent').style.display = 'block';
        }

        async function loginWithAccountId() {
            const accountInput = document.getElementById('accountIdInput').value.trim();
            
            if (!accountInput) {
                showToast('请输入账户ID或名称');
                return;
            }

            let accountId = accountInput;
            
            try {
                if (!accountInput.startsWith('acc_')) {
                    const searchResult = await api.get(`/api/account/find?name=${encodeURIComponent(accountInput)}`);
                    if (searchResult && searchResult.id) {
                        accountId = searchResult.id;
                        localStorage.setItem('accountName', searchResult.name);
                    }
                }
                
                currentAccountId = accountId;
                localStorage.setItem('accountId', currentAccountId);
                
                await loadAccount();
                showToast('登录成功');
            } catch (err) {
                showToast('账户不存在，请检查');
                currentAccountId = null;
                localStorage.removeItem('accountId');
                localStorage.removeItem('accountName');
            }
        }

        async function requestAccount() {
            const accountName = document.getElementById('accountNameInput').value.trim();
            
            if (!accountName) {
                showToast('请告知您的姓名');
                return;
            }

            try {
                const requestId = generateId('req');
                const requestData = {
                    id: requestId,
                    name: accountName,
                    status: 'pending',
                    requestTime: new Date().toISOString()
                };

                let pendingRequests = [];
                try {
                    const saved = localStorage.getItem('pendingRequests');
                    if (saved) pendingRequests = JSON.parse(saved);
                } catch (e) {}

                pendingRequests.push(requestData);
                localStorage.setItem('pendingRequests', JSON.stringify(pendingRequests));

                showToast('申请已提交，请联系管理员');
                
            } catch (err) {
                showToast('提交失败，请稍后再试');
            }
        }

        async function loadAccount() {
            const urlParams = new URLSearchParams(window.location.search);
            const aidParam = urlParams.get('aid');

            if (aidParam) {
                currentAccountId = aidParam;
                localStorage.setItem('accountId', currentAccountId);
            }

            if (!currentAccountId) {
                showLogin();
                return;
            }

            document.title = '墨记 · 记账本';

            try {
                accountData = await api.get('/account/' + currentAccountId);
                
                if (accountData.name) {
                    localStorage.setItem('accountName', accountData.name);
                }
                
                showMain();
                initApp();
            } catch (err) {
                console.error('加载账户失败:', err);
                showLogin();
            }
        }

        function initApp() {
            updateAccountSelector();
            updateBalance();
            updateCategorySelect();
            updateAccountSelect();
            updateCalendar();
            loadRecords();
            initDatePicker();
        }

        function updateAccountSelector() {
            const selector = document.getElementById('accountSelector');
            selector.innerHTML = '';
            accountData.accounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.id;
                option.textContent = `${acc.name} ¥${acc.balance.toFixed(2)}`;
                if (acc.id === currentAccountId) {
                    option.selected = true;
                }
                selector.appendChild(option);
            });
        }

        function updateBalance() {
            const total = accountData.accounts.reduce((sum, acc) => sum + acc.balance, 0);
            const balanceEl = document.getElementById('totalBalance');
            balanceEl.textContent = total.toFixed(2);
            balanceEl.className = `ink-balance ${total >= 0 ? 'positive' : 'negative'}`;

            const badgesEl = document.getElementById('accountBalances');
            badgesEl.innerHTML = '';
            accountData.accounts.forEach(acc => {
                const badge = document.createElement('div');
                badge.className = 'ink-chip';
                badge.innerHTML = `<span>${acc.name}</span><span>¥${acc.balance.toFixed(2)}</span>`;
                badgesEl.appendChild(badge);
            });
        }

        function updateCategorySelect() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = '';
            const filtered = accountData.categories.filter(c => c.type === currentType);
            filtered.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = `${cat.icon} ${cat.name}`;
                select.appendChild(option);
            });
        }

        function updateAccountSelect() {
            const select = document.getElementById('accountSelect');
            select.innerHTML = '';
            accountData.accounts.filter(a => a.status === 'active').forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.id;
                option.textContent = acc.name;
                select.appendChild(option);
            });
        }

        function initDatePicker() {
            const now = new Date();
            flatpickr('#dateInput', {
                locale: 'zh',
                dateFormat: 'Y-m-d',
                defaultDate: now,
                allowInput: true
            });
            document.getElementById('timeInput').value = now.toTimeString().substring(0, 5);
        }

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                updateCategorySelect();
            });
        });

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amountInput').value);
            if (!amount || amount <= 0) {
                showToast('请输入金额');
                return;
            }

            const dateValue = document.getElementById('dateInput').value;
            const timeValue = document.getElementById('timeInput').value;
            const dateTime = new Date(`${dateValue}T${timeValue}`).toISOString();

            const record = {
                accountId: document.getElementById('accountSelect').value,
                categoryId: document.getElementById('categorySelect').value,
                amount: amount,
                type: currentType,
                date: dateTime,
                remark: document.getElementById('remarkInput').value,
                source: 'manual'
            };

            try {
                await api.post('/records', { accountId: currentAccountId, record });
                showToast('已保存');
                document.getElementById('recordForm').reset();
                initDatePicker();

                accountData = await api.get(`/account/${currentAccountId}`);
                updateBalance();
                updateCalendar();
                loadRecords();
            } catch (err) {
                showToast('保存失败');
            }
        });

        async function loadRecords() {
            try {
                const records = await api.get(`/records/${currentAccountId}`);

                const startOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
                const endOfMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);

                const monthRecords = records.filter(r => {
                    const d = new Date(r.date);
                    return d >= startOfMonth && d <= endOfMonth;
                });

                document.getElementById('recordsCount').textContent = `本月 ${monthRecords.length} 条`;

                const listEl = document.getElementById('recordList');
                listEl.innerHTML = '';

                if (records.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <div>暂无记录</div>
                        </div>
                    `;
                    return;
                }

                const categoryMap = {};
                accountData.categories.forEach(c => categoryMap[c.id] = c);

                records.slice(0, 50).forEach(record => {
                    const cat = categoryMap[record.categoryId] || { icon: '📦', name: '未知' };
                    const date = new Date(record.date);
                    const dateStr = date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                    const timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

                    const item = document.createElement('div');
                    item.className = 'record-item';
                    item.innerHTML = `
                        <div class="record-icon">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-category">${cat.name}</div>
                            <div class="record-remark">${record.remark || ''} · ${timeStr}</div>
                        </div>
                        <div>
                            <div class="record-amount ${record.type}">${record.type === 'income' ? '+' : '-'}${parseFloat(record.amount).toFixed(2)}</div>
                            <div class="record-date">${dateStr}</div>
                        </div>
                        <button class="record-delete" onclick="deleteRecord('${record.id}')">×</button>
                    `;
                    listEl.appendChild(item);
                });
            } catch (err) {
                console.error('加载记录失败:', err);
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除？')) return;

            try {
                await api.delete(`/records/${id}`, { accountId: currentAccountId });
                showToast('已删除');
                accountData = await api.get(`/account/${currentAccountId}`);
                updateBalance();
                updateCalendar();
                loadRecords();
            } catch (err) {
                showToast('删除失败');
            }
        }

        function updateCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            document.getElementById('calendarTitle').textContent = `${year}年${month + 1}月`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const days = ['日', '一', '二', '三', '四', '五', '六'];
            days.forEach(d => {
                const header = document.createElement('div');
                header.className = 'calendar-day-header';
                header.textContent = d;
                grid.appendChild(header);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            const recordsByDate = {};
            accountData.records.forEach(r => {
                const d = r.date.split('T')[0];
                if (!recordsByDate[d]) recordsByDate[d] = { income: 0, expense: 0 };
                recordsByDate[d][r.type] += parseFloat(r.amount);
            });

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day other-month';
                grid.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';

                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
                if (isToday) dayEl.classList.add('today');

                if (selectedDate === dateStr) dayEl.classList.add('selected');

                dayEl.innerHTML = `<span>${day}</span>`;

                if (recordsByDate[dateStr]) {
                    if (recordsByDate[dateStr].expense > 0) {
                        dayEl.innerHTML += `<div class="day-expense">-${recordsByDate[dateStr].expense.toFixed(0)}</div>`;
                    }
                    if (recordsByDate[dateStr].income > 0) {
                        dayEl.innerHTML += `<div class="day-income">+${recordsByDate[dateStr].income.toFixed(0)}</div>`;
                    }
                }

                dayEl.addEventListener('click', () => selectDate(dateStr));
                grid.appendChild(dayEl);
            }
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            updateCalendar();
        }

        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            updateCalendar();
            loadRecords();
        }

        function goToToday() {
            currentMonth = new Date();
            selectedDate = null;
            updateCalendar();
            loadRecords();
        }

        document.getElementById('accountSelector').addEventListener('change', (e) => {
            window.location.href = `?aid=${e.target.value}`;
        });

        loadAccount();
    </script>
</body>
</html>
