<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }
        .main-content { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 15px;
        }
        .login-section { max-width: 400px; margin: 100px auto; text-align: center; }
        .login-box { background: #fff; border-radius: 24px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .login-box h2 { margin-bottom: 20px; font-size: 22px; color: #333; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #eee; border-radius: 14px; font-size: 14px; margin-bottom: 15px; background: #fafafa; }
        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
            width: 100%; 
            padding: 16px;
        }
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #999; 
            margin-bottom: 15px; 
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fafafa; padding: 18px; border-radius: 18px; text-align: center; border: 1px solid #f0f0f0; }
        .stat-value { font-size: 28px; font-weight: 500; color: #333; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        th { font-weight: 500; color: #999; font-size: 12px; letter-spacing: 1px; }
        td { color: #333; }
        .account-cell { display: flex; align-items: center; gap: 8px; }
        .account-id { font-family: monospace; font-size: 11px; color: #666; background: #f5f5f5; padding: 4px 8px; border-radius: 8px; }
        .action-btn { padding: 8px 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 12px; margin-right: 6px; background: #f5f5f5; color: #666; }
        .action-btn:hover { background: #eee; color: #333; }
        .action-btn.approve { background: #e8f5e9; color: #2e7d32; }
        .action-btn.reject { background: #ffebee; color: #c62828; }
        .action-btn.export { background: #e3f2fd; color: #1565c0; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 24px; padding: 25px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 500; letter-spacing: 2px; color: #333; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #ccc; line-height: 1; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .detail-item { background: #fafafa; padding: 14px; border-radius: 14px; border: 1px solid #f0f0f0; }
        .detail-label { font-size: 11px; color: #999; margin-bottom: 5px; letter-spacing: 1px; }
        .detail-value { font-size: 14px; font-weight: 500; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 14px; 
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group .ink-btn { flex: 1; }
        .ink-btn-secondary { background: #f5f5f5; color: #333; }
        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .toast.show { opacity: 1; }
        .hidden { display: none !important; }
        .records-list { max-height: 300px; overflow-y: auto; }
        .record-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .record-row:last-child { border-bottom: none; }
        .no-data { text-align: center; padding: 40px; color: #ccc; }
        .pending-badge { background: #fff3e0; color: #e65100; padding: 4px 10px; border-radius: 8px; font-size: 11px; }
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">管理后台</div>
        <div class="header-links">
            <a href="index.html">🏠 返回首页</a>
        </div>
    </div>

    <div class="main-content">
        <div class="login-section" id="loginSection">
            <div class="login-box">
                <h2>🔑 管理员登录</h2>
                <input type="password" id="adminKey" placeholder="请输入管理员密钥">
                <button class="ink-btn ink-btn-primary" onclick="adminLogin()">登录</button>
            </div>
        </div>

        <div id="adminContent" class="hidden">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="totalAccounts">0</div>
                    <div class="stat-label">账号总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalRecords">0</div>
                    <div class="stat-label">记账记录</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalBalance">¥0</div>
                    <div class="stat-label">总资产</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingRequests">0</div>
                    <div class="stat-label">待审批</div>
                </div>
            </div>

            <div class="ink-card">
                <div class="ink-title">
                    <span>➕ 直接创建账号</span>
                </div>
                <div class="form-group">
                    <label>账号名称</label>
                    <input type="text" id="newAccountName" placeholder="输入账号名称" maxlength="20">
                </div>
                <button class="ink-btn ink-btn-primary" onclick="createAccount()">创建账号</button>
            </div>

            <div class="ink-card">
                <div class="ink-title">
                    <span>📝 账号申请列表</span>
                    <button class="action-btn" onclick="refreshRequests()">🔄 刷新</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>申请ID</th>
                                <th>姓名</th>
                                <th>申请时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="ink-card">
                <div class="ink-title">
                    <span>📋 账户列表</span>
                    <button class="action-btn" onclick="refreshAccounts()">🔄 刷新</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>账户名</th>
                                <th>账户ID</th>
                                <th>账户数</th>
                                <th>记录数</th>
                                <th>总资产</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="accountsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="ink-card">
            <div class="ink-title">
                <span>💬 用户反馈</span>
                <button class="action-btn" onclick="loadAccounts().then(function(){ loadFeedbacks(); })">🔄 刷新</button>
            </div>
            <div id="feedbacksList">
                <div style="text-align:center; padding: 30px; color: #ccc;">点击刷新加载反馈</div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">账户详情</span>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div class="detail-grid" id="accountDetails"></div>

            <div class="ink-card" style="margin-top: 20px; padding: 20px;">
                <div class="ink-title" style="margin-bottom: 12px;">💰 账户余额</div>
                <div id="accountBalances"></div>
            </div>

            <div class="ink-card" style="padding: 20px;">
                <div class="ink-title" style="margin-bottom: 12px;">📜 最近记账记录</div>
                <div class="records-list" id="accountRecords"></div>
            </div>

            <div class="ink-card" style="background: #fff8e1; border-color: #ffe0b2; padding: 20px;">
                <div class="ink-title" style="color: #e65100; margin-bottom: 12px;">
                    <span>⚙️ 调整账户余额</span>
                </div>
                <div class="form-group" style="margin-bottom: 10px;">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <select id="adjustAccountSelect" style="flex: 1;"></select>
                        <input type="number" id="adjustAmount" placeholder="输入金额（正数增加，负数减少）" style="flex: 2;">
                    </div>
                </div>
                <button class="ink-btn ink-btn-primary" onclick="adjustBalance()">确认调整</button>
            </div>
            <div class="btn-group">
                <button class="ink-btn ink-btn-secondary" onclick="closeDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">编辑账户</span>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <div class="form-group">
                <label>账户ID</label>
                <input type="text" id="editAccountId" readonly style="background: #f5f5f5;">
            </div>
            <div class="form-group">
                <label>账户名称</label>
                <input type="text" id="editAccountName" placeholder="输入账户名称" maxlength="20">
            </div>
            <div class="btn-group">
                <button class="ink-btn ink-btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="ink-btn ink-btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">⚠️ 确认删除</span>
                <button class="modal-close" onclick="closeDeleteModal()">×</button>
            </div>
            <div style="text-align: center; padding: 30px;">
                <p style="font-size: 16px; margin-bottom: 10px; color: #333;">确定要删除这个账户吗？</p>
                <p style="color: #c62828; font-weight: 500;">此操作不可恢复！</p>
            </div>
            <div class="btn-group">
                <button class="ink-btn ink-btn-secondary" onclick="closeDeleteModal()">取消</button>
                <button class="ink-btn ink-btn-primary" style="background: #c62828;" onclick="deleteAccount()">确认删除</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js?v=20260508"></script>
    <script src="api.js?v=20260508"></script>
    <script src="lang-style.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let adminToken = localStorage.getItem('adminToken');
        let accounts = [];
        let requests = [];
        let currentDetailAccount = null;

        function formatCategoryName(cat) {
            return LangStyle.formatCategoryNamePlain(cat);
        }

        async function adminLogin() {
            const key = document.getElementById('adminKey').value;
            if (!key) { showToast('请输入管理员密钥'); return; }
            try {
                const result = await api.post('/admin/login', { key: key });
                adminToken = result.token;
                localStorage.setItem('adminToken', adminToken);
                showAdminContent();
                loadAccounts();
                loadRequests();
                loadFeedbacks();
            } catch (err) {
                showToast('密钥错误');
            }
        }

        function showAdminContent() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
        }

        async function checkAuth() {
            if (!adminToken) return;
            try {
                await api.get('/admin/accounts', { 'admin-key': adminToken });
                showAdminContent();
                loadAccounts();
                loadRequests();
                loadFeedbacks();
            } catch (err) {
                localStorage.removeItem('adminToken');
                adminToken = null;
            }
        }

        async function loadAccounts() {
            try {
                accounts = await api.get('/admin/accounts', { 'admin-key': adminToken });
                renderAccounts();
                updateStats();
            } catch (err) {
                if (err.message.includes('403')) {
                    localStorage.removeItem('adminToken');
                    adminToken = null;
                    showToast('会话已过期');
                    return;
                }
                showToast('加载失败');
            }
        }

        function refreshAccounts() {
            loadAccounts();
        }

        async function loadRequests() {
            try {
                let pendingRequests = [];
                const saved = localStorage.getItem('pendingRequests');
                if (saved) pendingRequests = JSON.parse(saved);
                requests = pendingRequests;
                renderRequests();
                updateStats();
            } catch (err) {
                showToast('加载申请失败');
            }
        }

        function refreshRequests() {
            loadRequests();
        }

        function renderRequests() {
            const tbody = document.getElementById('requestsTable');
            const pendingRequests = requests.filter(r => r.status === 'pending');

            if (pendingRequests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #ccc;">暂无申请</td></tr>';
                return;
            }

            tbody.innerHTML = pendingRequests.map(req => `
                <tr>
                    <td><span class="account-id">${req.id}</span></td>
                    <td>${req.name}</td>
                    <td>${new Date(req.requestTime).toLocaleString('zh-CN')}</td>
                    <td><span class="pending-badge">待审批</span></td>
                    <td>
                        <button class="action-btn approve" onclick="approveRequest('${req.id}', '${req.name}')">通过</button>
                        <button class="action-btn reject" onclick="rejectRequest('${req.id}')">拒绝</button>
                    </td>
                </tr>
            `).join('');
        }

        async function createAccount() {
            const accountName = document.getElementById('newAccountName').value.trim();
            
            if (!accountName) {
                showToast('请输入账号名称');
                return;
            }

            try {
                const newAccountId = 'acc_' + Math.random().toString(36).substr(2, 8);
                await api.post('/account', { id: newAccountId, name: accountName });
                
                showToast(`账号创建成功！账号ID: ${newAccountId}`);
                document.getElementById('newAccountName').value = '';
                loadAccounts();
            } catch (err) {
                console.error('创建账号失败:', err);
                showToast('创建账号失败，请检查控制台错误信息');
            }
        }

        async function approveRequest(requestId, accountName) {
            if (!confirm(`确定要通过 ${accountName} 的账号申请吗？`)) return;

            try {
                const newAccountId = 'acc_' + Math.random().toString(36).substr(2, 8);
                await api.post('/account', { id: newAccountId, name: accountName });

                let pendingRequests = [];
                const saved = localStorage.getItem('pendingRequests');
                if (saved) pendingRequests = JSON.parse(saved);

                pendingRequests = pendingRequests.map(r => {
                    if (r.id === requestId) {
                        return { ...r, status: 'approved', approvedTime: new Date().toISOString() };
                    }
                    return r;
                });
                localStorage.setItem('pendingRequests', JSON.stringify(pendingRequests));

                showToast(`账号已创建！账号ID: ${newAccountId}`);
                loadRequests();
                loadAccounts();
            } catch (err) {
                console.error('审批失败:', err);
                showToast('创建账号失败，请检查控制台错误信息');
            }
        }

        function rejectRequest(requestId) {
            if (!confirm('确定要拒绝这个申请吗？')) return;

            let pendingRequests = [];
            const saved = localStorage.getItem('pendingRequests');
            if (saved) pendingRequests = JSON.parse(saved);

            pendingRequests = pendingRequests.map(r => {
                if (r.id === requestId) {
                    return { ...r, status: 'rejected', rejectedTime: new Date().toISOString() };
                }
                return r;
            });
            localStorage.setItem('pendingRequests', JSON.stringify(pendingRequests));

            showToast('申请已拒绝');
            loadRequests();
        }

        function updateStats() {
            const totalBalance = accounts.reduce((sum, acc) => sum + acc.totalBalance, 0);
            const totalRecords = accounts.reduce((sum, acc) => sum + acc.recordCount, 0);
            const pendingRequests = requests.filter(r => r.status === 'pending').length;

            document.getElementById('totalAccounts').textContent = accounts.length;
            document.getElementById('totalRecords').textContent = totalRecords;
            document.getElementById('totalBalance').textContent = `¥${totalBalance.toFixed(0)}`;
            document.getElementById('pendingRequests').textContent = pendingRequests;
        }

        async function loadFeedbacks() {
            try {
                var feedbacks = await api.get('/admin/feedbacks', { 'admin-key': adminToken });
                var listEl = document.getElementById('feedbacksList');
                if (!feedbacks || feedbacks.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center; padding:30px; color:#ccc;">暂无用户反馈</div>';
                    return;
                }

                var nameMap = {};
                (accounts || []).forEach(function(a) { nameMap[a.id] = a.name; });

                var typeMap = { bug: '🐛 问题报告', suggest: '💡 功能建议', other: '📝 其他' };
                listEl.innerHTML = feedbacks.map(function(f, idx) {
                    var date = new Date(f.createTime).toLocaleString('zh-CN');
                    var typeLabel = typeMap[f.type] || f.type;
                    var accountName = f.accountId ? (nameMap[f.accountId] || '未知用户') : '匿名用户';
                    var fid = 'fb_detail_' + idx;

                    return '<div style="border-bottom:1px solid #f0f0f0;">' +
                        '<div onclick="toggleFbDetail(\'' + fid + '\')" style="display:flex; justify-content:space-between; align-items:center; padding:14px 0; cursor:pointer;">' +
                            '<div style="flex:1; min-width:0;">' +
                                '<div style="font-size:14px; color:#333; font-weight:500; margin-bottom:4px;">' + typeLabel + '</div>' +
                                '<div style="font-size:12px; color:#999;">' +
                                    (f.accountId ? '👤 ' + accountName + ' <span style="color:#ccc; font-size:11px;">(' + f.accountId + ')</span>' : '👤 匿名') +
                                '</div>' +
                            '</div>' +
                            '<span style="font-size:11px; color:#ccc; flex-shrink:0; margin-left:12px;">' + date + '</span>' +
                        '</div>' +
                        '<div id="' + fid + '" style="display:none; padding:0 0 16px 0;">' +
                            '<div style="font-size:14px; color:#333; line-height:1.7; white-space:pre-wrap; background:#fafafa; border-radius:12px; padding:14px; margin-bottom:10px;">' + (f.content || '') + '</div>' +
                            (f.contact ? '<div style="font-size:12px; color:#666; margin-bottom:4px;">📧 联系方式：' + f.contact + '</div>' : '') +
                            (f.accountId ? '<div style="font-size:11px; color:#bbb;">🆔 账号ID：' + f.accountId + '</div>' : '') +
                            '<div style="font-size:11px; color:#ccc; margin-top:2px;">⏰ ' + date + '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch (err) {
                console.error('加载反馈失败:', err);
            }
        }

        function toggleFbDetail(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = (el.style.display === 'none' ? 'block' : 'none');
        }

        function renderAccounts() {
            const tbody = document.getElementById('accountsTable');
            tbody.innerHTML = '';

            if (accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #ccc;">暂无数据</td></tr>';
                return;
            }

            accounts.forEach(acc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${acc.name}</strong></td>
                    <td><span class="account-id">${acc.id}</span></td>
                    <td>${acc.accountCount}</td>
                    <td>${acc.recordCount}</td>
                    <td style="color: ${acc.totalBalance >= 0 ? '#2e7d32' : '#c62828'};">¥${acc.totalBalance.toFixed(2)}</td>
                    <td>${new Date(acc.createTime).toLocaleDateString('zh-CN')}</td>
                    <td>
                        <button class="action-btn" onclick="viewAccount('${acc.id}')">查看</button>
                        <button class="action-btn" onclick="openEditModal('${acc.id}', '${acc.name}')">编辑</button>
                        <button class="action-btn export" onclick="exportAccount('${acc.id}', '${acc.name}')">导出</button>
                        <button class="action-btn" onclick="updateAccount('${acc.id}', '${acc.name}')">🔄 更新</button>
                        <button class="action-btn" style="background: #ffebee; color: #c62828;" onclick="resetAccount('${acc.id}', '${acc.name}')">🗑️ 重置</button>
                        <button class="action-btn" style="background: #ffebee; color: #c62828;" onclick="confirmDelete('${acc.id}')">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function viewAccount(id) {
            try {
                currentDetailAccount = await api.get(`/admin/account/${id}`, { 'admin-key': adminToken });
                renderAccountDetail();
                openDetailModal();
            } catch (err) {
                showToast('加载失败');
            }
        }

        function renderAccountDetail() {
            const acc = currentDetailAccount;

            document.getElementById('accountDetails').innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">账户名称</div>
                    <div class="detail-value"><strong>${acc.name}</strong></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">账户ID</div>
                    <div class="detail-value"><span class="account-id">${acc.id}</span></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">账户数量</div>
                    <div class="detail-value">${acc.accounts.length} 个</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">记账记录</div>
                    <div class="detail-value">${acc.records.length} 条</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">分类数量</div>
                    <div class="detail-value">${acc.categories.length} 个</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">创建时间</div>
                    <div class="detail-value">${new Date(acc.createTime).toLocaleString('zh-CN')}</div>
                </div>
            `;

            const categoryMap = {};
            acc.categories.forEach(c => categoryMap[c.id] = c);

            const balancesHtml = acc.accounts.map(a => `
                <div class="detail-item">
                    <div class="detail-label">${a.name} (${a.type})</div>
                    <div class="detail-value" style="color: ${a.balance >= 0 ? '#2e7d32' : '#c62828'};">¥${a.balance.toFixed(2)}</div>
                </div>
            `).join('');
            document.getElementById('accountBalances').innerHTML = balancesHtml;

            const adjustSelect = document.getElementById('adjustAccountSelect');
            adjustSelect.innerHTML = acc.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');

            const recordsList = document.getElementById('accountRecords');
            if (acc.records.length === 0) {
                recordsList.innerHTML = '<div class="no-data">暂无记账记录</div>';
            } else {
                recordsList.innerHTML = acc.records.slice(0, 20).map(r => {
                    const cat = categoryMap[r.categoryId] || { name: '未知', icon: '📦' };
                    return `
                        <div class="record-row">
                            <span>${cat.icon} ${formatCategoryName(cat)}</span>
                            <span style="color: ${r.type === 'income' ? '#2e7d32' : '#c62828'};">
                                ${r.type === 'income' ? '+' : '-'}${parseFloat(r.amount).toFixed(2)}
                            </span>
                            <span style="color: #999;">${new Date(r.date).toLocaleDateString('zh-CN')}</span>
                        </div>
                    `;
                }).join('');
            }
        }

        function openDetailModal() {
            document.getElementById('detailModal').classList.add('show');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
            currentDetailAccount = null;
        }

        function openAdjustModal(accountId) {
            viewAccount(accountId);
        }

        let editingAccountId = null;
        let deletingAccountId = null;

        function openEditModal(id, name) {
            editingAccountId = id;
            document.getElementById('editAccountId').value = id;
            document.getElementById('editAccountName').value = name;
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingAccountId = null;
        }

        async function saveEdit() {
            const newName = document.getElementById('editAccountName').value.trim();
            if (!newName) {
                showToast('请输入账户名称');
                return;
            }

            try {
                await api.post('/admin/rename-account', {
                    accountId: editingAccountId,
                    newName
                }, { 'admin-key': adminToken });

                showToast('账户已重命名');
                closeEditModal();
                loadAccounts();
            } catch (err) {
                showToast('重命名失败');
            }
        }

        function confirmDelete(id) {
            deletingAccountId = id;
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deletingAccountId = null;
        }

        async function deleteAccount() {
            if (!deletingAccountId) return;

            try {
                await api.post('/admin/delete-account', {
                    accountId: deletingAccountId
                }, { 'admin-key': adminToken });

                showToast('账户已删除');
                closeDeleteModal();
                loadAccounts();
            } catch (err) {
                showToast('删除失败');
            }
        }

        async function exportAccount(id, name) {
            try {
                const data = await api.get(`/admin/account/${id}`, { 'admin-key': adminToken });
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name}_${id}_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('导出成功！');
            } catch (err) {
                showToast('导出失败');
            }
        }

        async function resetAccount(id, name) {
            if (!confirm(`出厂重置账户「${name}」？\n\n⚠️ 将清空所有记账记录和预算，恢复为默认账户与分类。此操作不可恢复！`)) return;

            try {
                await api.post('/admin/reset-account', {
                    accountId: id
                }, { 'admin-key': adminToken });

                showToast('账户已恢复出厂设置');
                loadAccounts();
            } catch (err) {
                showToast('重置失败');
            }
        }

        async function updateAccount(id, name) {
            if (!confirm(`软件更新账户「${name}」？\n\n🔄 将同步最新默认账户与分类配置，保留所有原有记账数据、余额和自定义账户。`)) return;

            try {
                var result = await api.post('/admin/update-account', {
                    accountId: id
                }, { 'admin-key': adminToken });

                showToast('配置已更新（账户' + result.accounts + '个，分类' + result.categories + '个）');
                loadAccounts();
            } catch (err) {
                showToast('更新失败');
            }
        }

        async function adjustBalance() {
            if (!currentDetailAccount) return;

            const targetAccountId = document.getElementById('adjustAccountSelect').value;
            const adjustment = parseFloat(document.getElementById('adjustAmount').value);

            if (!adjustment || adjustment === 0) {
                showToast('请输入有效金额');
                return;
            }

            try {
                await api.post('/admin/adjust-balance', {
                    accountId: currentDetailAccount.id,
                    targetAccountId,
                    adjustment
                }, { 'admin-key': adminToken });

                showToast('余额已调整');
                document.getElementById('adjustAmount').value = '';
                viewAccount(currentDetailAccount.id);
                loadAccounts();
            } catch (err) {
                showToast('调整失败');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        checkAuth();
    </script>
</body>
</html>
