<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 记账小群</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght=300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ink-transition.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 水墨装饰背景 */
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }

        .main-content { 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 20px;
            padding-bottom: 80px;
        }

        /* 水墨风格卡片 */
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #666; 
            margin-bottom: 20px; 
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
        }
        .ink-btn-primary:hover { background: #444; }
        .ink-btn-secondary { 
            background: #f5f5f5; 
            color: #333; 
        }
        .ink-btn-secondary:hover { background: #eee; }

        /* 群组卡片 */
        .group-card { 
            background: #fafafa; 
            border-radius: 18px; 
            padding: 20px; 
            margin-bottom: 15px; 
            cursor: pointer; 
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
        }
        .group-card:hover { 
            background: #f5f5f5; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }
        .group-card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }
        .group-name { 
            font-size: 18px; 
            color: #333;
            font-weight: 500;
        }
        .group-balance { 
            font-size: 20px; 
            font-weight: 400; 
            color: #333;
            letter-spacing: 1px;
        }
        .group-meta { 
            font-size: 13px; 
            color: #999; 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap;
        }
        .copy-btn { 
            background: #fff; 
            border: 1px solid #eee; 
            padding: 5px 12px; 
            border-radius: 10px; 
            font-size: 12px; 
            cursor: pointer;
            color: #666;
        }
        .copy-btn:hover { background: #f5f5f5; }
        .group-actions { 
            display: flex; 
            gap: 10px; 
            margin-top: 12px; 
        }

        .empty-state { 
            text-align: center; 
            padding: 50px 20px; 
            color: #ccc; 
        }
        .empty-state-icon { 
            font-size: 52px; 
            margin-bottom: 12px; 
            opacity: 0.6;
        }

        /* 模态框 */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(0,0,0,0.4); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content { 
            background: #fff; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 400px; 
            max-height: 90vh; 
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .modal-header { 
            padding: 20px 25px; 
            border-bottom: 1px solid #f5f5f5; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .modal-title { 
            font-size: 16px; 
            font-weight: 500;
            letter-spacing: 2px;
        }
        .modal-close { 
            background: none; 
            border: none; 
            font-size: 28px; 
            cursor: pointer; 
            color: #999; 
            line-height: 1;
        }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            font-size: 15px;
            background: #fafafa;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #ddd;
            background: #fff;
        }
        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }
        .btn-group .ink-btn { flex: 1; }

        /* 底部导航 */
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px;
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 22px; opacity: 0.9; }

        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">记账小群</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="add.html">➕ 记账</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="statistics.html">📊 统计</a>
            <a href="categories.html">📂 分类</a>
            <a href="budget.html">💰 预算</a>
            <a href="export.html">📤 导出</a>
            <a href="settings.html">⚙️ 设置</a>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="empty-state" id="loginPrompt">
            <div class="empty-state-icon">🔐</div>
            <p>请先登录您的账户</p>
            <button class="ink-btn ink-btn-primary" style="margin-top: 20px; display: inline-block;" onclick="location.href='index.html'">去登录</button>
        </div>

        <div id="groupContent" style="display: none;">
            <div class="ink-card">
                <div class="ink-title">
                    <span>我的群</span>
                    <button class="ink-btn ink-btn-secondary" onclick="openCreateGroupModal()">➕ 创建群</button>
                </div>
                <div id="groupList"></div>
            </div>

            <div class="ink-card">
                <div class="ink-title">
                    <span>加入群</span>
                </div>
                <div class="form-group">
                    <label>输入群ID</label>
                    <input type="text" id="joinGroupId" placeholder="输入群ID加入">
                </div>
                <button class="ink-btn ink-btn-primary" style="width: 100%;" onclick="joinGroup()">加入群</button>
            </div>
        </div>
    </div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="groups.html" class="ink-tab-item active">
            <span class="ink-tab-icon">👥</span>
            <span>群组</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="categories.html" class="ink-tab-item">
            <span class="ink-tab-icon">📂</span>
            <span>分类</span>
        </a>
    </div>

    <div class="modal" id="createGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">创建新群</span>
                <button class="modal-close" onclick="closeCreateGroupModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>群名称</label>
                    <input type="text" id="newGroupName" placeholder="输入群名称" maxlength="20">
                </div>
                <div class="btn-group">
                    <button class="ink-btn ink-btn-secondary" onclick="closeCreateGroupModal()">取消</button>
                    <button class="ink-btn ink-btn-primary" onclick="createGroup()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="editGroupModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">修改群名称</span>
                <button class="modal-close" onclick="closeEditGroupModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>群名称</label>
                    <input type="text" id="editGroupName" placeholder="输入新的群名称" maxlength="20">
                </div>
                <div class="btn-group">
                    <button class="ink-btn ink-btn-secondary" onclick="closeEditGroupModal()">取消</button>
                    <button class="ink-btn ink-btn-primary" onclick="updateGroup()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js?v=20260508"></script>
    <script src="api.js?v=20260508"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let currentAccountName = localStorage.getItem('accountName') || '成员';
        let myGroups = [];

        async function loadAccountInfo() {
            if (!currentAccountId) return;
            try {
                const accountData = await api.get('/account/' + currentAccountId);
                if (accountData && accountData.name) {
                    currentAccountName = accountData.name;
                    localStorage.setItem('accountName', currentAccountName);
                }
            } catch (err) {
                console.error('加载账户信息失败:', err);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateId(prefix) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = prefix + '_';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function checkLogin() {
            if (!currentAccountId) {
                document.getElementById('loginPrompt').style.display = 'block';
                document.getElementById('groupContent').style.display = 'none';
                return false;
            }
            document.getElementById('loginPrompt').style.display = 'none';
            document.getElementById('groupContent').style.display = 'block';
            return true;
        }

        async function loadGroups() {
            if (!checkLogin()) return;

            try {
                const groups = await api.get(`/api/groups/my?accountId=${currentAccountId}`);
                myGroups = groups || [];
                renderGroups();
            } catch (err) {
                console.error('加载群失败', err);
                document.getElementById('groupList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">❌</div><p>加载失败，请稍后重试</p></div>';
            }
        }

        function renderGroups() {
            const container = document.getElementById('groupList');

            if (myGroups.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><p>还没有加入任何群</p></div>';
                return;
            }

            container.innerHTML = myGroups.map(group => {
                const totalBalance = group.accounts ? group.accounts.reduce((sum, a) => sum + a.balance, 0) : 0;
                const memberCount = group.members ? group.members.length : 0;
                const recordCount = group.records ? group.records.length : 0;
                const isCreator = group.creatorId === currentAccountId;

                return `
                    <div class="group-card">
                        <div class="group-card-header" onclick="openGroupDetail('${group.id}')" style="cursor:pointer;">
                            <div class="group-name">${group.name}</div>
                            <div class="group-balance">¥${totalBalance.toFixed(2)}</div>
                        </div>
                        <div class="group-meta">
                            <span>👥 ${memberCount}人</span>
                            <span>📝 ${recordCount}条记录</span>
                            <span style="display:flex;align-items:center;gap:8px;">
                                🆔 ${group.id}
                                <button class="copy-btn" onclick="event.stopPropagation();copyGroupId('${group.id}')">复制</button>
                            </span>
                        </div>
                        ${isCreator ? `
                            <div class="group-actions" style="margin-top:12px;">
                                <button class="ink-btn ink-btn-secondary" style="padding:8px 14px;font-size:13px;" onclick="event.stopPropagation();openEditGroupModal('${group.id}')">✏️ 修改</button>
                                <button class="ink-btn ink-btn-secondary" style="padding:8px 14px;font-size:13px;background:#fafafa;color:#666;" onclick="event.stopPropagation();deleteGroup('${group.id}')">🗑️ 删除</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        async function copyGroupId(groupId) {
            try {
                await navigator.clipboard.writeText(groupId);
                showToast('群ID已复制！');
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = groupId;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('群ID已复制！');
            }
        }

        function openCreateGroupModal() {
            document.getElementById('newGroupName').value = '';
            document.getElementById('createGroupModal').classList.add('show');
        }

        function closeCreateGroupModal() {
            document.getElementById('createGroupModal').classList.remove('show');
        }

        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) {
                showToast('请输入群名称');
                return;
            }

            try {
                const group = await api.post('/api/groups/create', {
                    name,
                    creatorId: currentAccountId,
                    creatorName: currentAccountName
                });

                showToast('群创建成功！');
                closeCreateGroupModal();
                loadGroups();
            } catch (err) {
                showToast('创建失败');
            }
        }

        async function joinGroup() {
            const groupId = document.getElementById('joinGroupId').value.trim();
            if (!groupId) {
                showToast('请输入群ID');
                return;
            }

            try {
                await api.post('/api/groups/join', {
                    groupId,
                    accountId: currentAccountId,
                    accountName: currentAccountName
                });

                showToast('加入成功！');
                document.getElementById('joinGroupId').value = '';
                loadGroups();
            } catch (err) {
                showToast('加入失败，请检查群ID');
            }
        }

        let currentEditGroupId = null;

        function openEditGroupModal(groupId) {
            const group = myGroups.find(g => g.id === groupId);
            if (group) {
                currentEditGroupId = groupId;
                document.getElementById('editGroupName').value = group.name;
                document.getElementById('editGroupModal').classList.add('show');
            }
        }

        function closeEditGroupModal() {
            document.getElementById('editGroupModal').classList.remove('show');
            currentEditGroupId = null;
        }

        async function updateGroup() {
            const name = document.getElementById('editGroupName').value.trim();
            if (!name) {
                showToast('请输入群名称');
                return;
            }

            try {
                await api.put(`/api/groups/${currentEditGroupId}`, {
                    name,
                    creatorId: currentAccountId
                });

                showToast('群名称修改成功！');
                closeEditGroupModal();
                loadGroups();
            } catch (err) {
                showToast('修改失败');
            }
        }

        async function deleteGroup(groupId) {
            if (!confirm('确定要删除这个群吗？删除后将无法恢复！')) {
                return;
            }

            try {
                await api.delete(`/api/groups/${groupId}`, {
                    creatorId: currentAccountId
                });

                showToast('群删除成功！');
                loadGroups();
            } catch (err) {
                showToast('删除失败');
            }
        }

        function openGroupDetail(groupId) {
            location.href = `group-detail.html?id=${groupId}`;
        }

        // 初始化
        checkLogin();
        if (currentAccountId) {
            loadAccountInfo().then(() => {
                loadGroups();
            });
        }
    </script>
</body>
</html>
