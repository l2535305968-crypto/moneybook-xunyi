<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨记 · 预算管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; 
            background: #f8f7f5; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }
        .ink-header { 
            background: #fff; 
            color: #333; 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #eee;
        }
        .header-title { 
            font-size: 32px; 
            font-family: 'Ma Shan Zheng', 'Noto Serif SC', 'STKaiti', cursive;
            letter-spacing: 12px;
            position: relative;
        }
        .header-title::after {
            content: '●';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.3;
        }
        .header-links { 
            display: flex; 
            gap: 15px; 
            margin-top: 10px;
        }
        .header-links a { 
            color: #999; 
            text-decoration: none; 
            font-size: 13px; 
            opacity: 0.9; 
        }
        .header-links a:hover { color: #333; }
        .main-content { 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 15px;
            padding-bottom: 100px;
        }
        .month-selector { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
        .month-nav { background: #fff; border: 1px solid #eee; padding: 10px 16px; border-radius: 14px; cursor: pointer; font-size: 16px; color: #666; }
        .month-display { font-size: 18px; font-weight: 500; color: #333; }
        .ink-card { 
            background: #fff; 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
        }
        .ink-title { 
            font-size: 16px; 
            color: #999; 
            margin-bottom: 15px; 
            letter-spacing: 4px;
        }
        .total-budget { text-align: center; padding: 25px; background: linear-gradient(135deg, #333 0%, #555 100%); border-radius: 18px; color: #fff; margin-bottom: 20px; }
        .total-budget-label { font-size: 13px; opacity: 0.9; letter-spacing: 1px; }
        .total-budget-amount { font-size: 36px; font-weight: 500; margin: 10px 0; }
        .total-budget-progress { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 15px; }
        .total-budget-progress-bar { height: 100%; background: #fff; border-radius: 4px; transition: width 0.3s; }
        .budget-card { display: flex; align-items: center; padding: 16px; border-radius: 16px; margin-bottom: 12px; gap: 14px; background: #fafafa; border: 1px solid #f0f0f0; }
        .budget-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .budget-info { flex: 1; }
        .budget-name { font-size: 15px; font-weight: 500; color: #333; }
        .budget-progress { height: 6px; background: #f0f0f0; border-radius: 3px; margin-top: 8px; }
        .budget-progress-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .budget-stats { text-align: right; }
        .budget-spent { font-size: 16px; font-weight: 500; color: #333; }
        .budget-remaining { font-size: 12px; color: #999; margin-top: 4px; }
        .budget-over { color: #c62828; }
        .ink-btn { 
            padding: 10px 18px; 
            border: none; 
            border-radius: 16px; 
            font-size: 14px; 
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .ink-btn-primary { 
            background: #333; 
            color: #fff; 
            width: 100%; 
            padding: 16px;
            margin-top: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 8px; 
            letter-spacing: 1px;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid #eee; 
            border-radius: 14px; 
            font-size: 14px; 
            background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #ddd; 
            background: #fff;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group .ink-btn { flex: 1; }
        .ink-btn-secondary { background: #f5f5f5; color: #333; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 24px; padding: 25px; width: 90%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 500; letter-spacing: 2px; color: #333; }
        .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #ccc; line-height: 1; }
        .empty-state { text-align: center; padding: 50px 20px; color: #ccc; }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
        .toast { 
            position: fixed; 
            bottom: 100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #333; 
            color: #fff; 
            padding: 14px 24px; 
            border-radius: 50px; 
            font-size: 14px; 
            z-index: 2000; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .toast.show { opacity: 1; }
        .ink-tab-bar { 
            display: flex; 
            background: #fff; 
            border-top: 1px solid #f5f5f5; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 8px 0 25px;
        }
        .ink-tab-item { 
            flex: 1; 
            padding: 10px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 11px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            transition: color 0.3s ease;
        }
        .ink-tab-item.active { color: #333; }
        .ink-tab-icon { font-size: 20px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="ink-header">
        <div class="header-title">预算管理</div>
        <div class="header-links">
            <a href="index.html">🏠 首页</a>
            <a href="accounts.html">🏦 账户</a>
            <a href="categories.html">📂 分类</a>
            <a href="statistics.html">📈 统计</a>
        </div>
    </div>

    <div class="main-content">
        <div class="month-selector">
            <button class="month-nav" onclick="changeMonth(-1)">◀</button>
            <span class="month-display" id="monthDisplay">2026年4月</span>
            <button class="month-nav" onclick="changeMonth(1)">▶</button>
        </div>

        <div class="ink-card">
            <div class="total-budget">
                <div class="total-budget-label">本月总预算</div>
                <div class="total-budget-amount" id="totalBudgetAmount">¥0.00</div>
                <div style="font-size: 13px; opacity: 0.9;">
                    <span id="totalSpent">已花费 ¥0.00</span> / <span id="totalBudgetDisplay">预算 ¥0.00</span>
                </div>
                <div class="total-budget-progress">
                    <div class="total-budget-progress-bar" id="totalProgressBar" style="width: 0%"></div>
                </div>
            </div>

            <div class="ink-title">📋 分类预算</div>
            <div id="budgetList"></div>
            <button class="ink-btn ink-btn-primary" onclick="openAddModal()">➕ 添加预算</button>
        </div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">添加预算</span>
                <button class="modal-close" onclick="closeAddModal()">×</button>
            </div>
            <form id="addBudgetForm">
                <div class="form-group">
                    <label>分类（留空为总预算）</label>
                    <select id="newBudgetCategory">
                        <option value="">总预算</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>预算金额</label>
                    <input type="number" id="newBudgetAmount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="btn-group">
                    <button type="button" class="ink-btn ink-btn-secondary" onclick="closeAddModal()">取消</button>
                    <button type="submit" class="ink-btn ink-btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ink-tab-bar">
        <a href="index.html" class="ink-tab-item">
            <span class="ink-tab-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="add.html" class="ink-tab-item">
            <span class="ink-tab-icon">➕</span>
            <span>记账</span>
        </a>
        <a href="statistics.html" class="ink-tab-item">
            <span class="ink-tab-icon">📊</span>
            <span>统计</span>
        </a>
        <a href="export.html" class="ink-tab-item">
            <span class="ink-tab-icon">📤</span>
            <span>导出</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ink-transition.js"></script>
    <script>
        let currentAccountId = localStorage.getItem('accountId');
        let accountData = null;
        let budgets = [];
        let currentMonth = new Date();

        function formatMonth(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function formatMonthDisplay(date) {
            return `${date.getFullYear()}年${date.getMonth() + 1}月`;
        }

        async function loadAccount() {
            try {
                accountData = await api.get(`/account/${currentAccountId}`);
                budgets = await api.get(`/budgets/${currentAccountId}`);

                updateMonthDisplay();
                renderBudgets();
                updateCategorySelect();
            } catch (err) {
                showToast('加载失败');
            }
        }

        function updateMonthDisplay() {
            document.getElementById('monthDisplay').textContent = formatMonthDisplay(currentMonth);
        }

        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            updateMonthDisplay();
            renderBudgets();
        }

        function getMonthBudgets() {
            const monthStr = formatMonth(currentMonth);
            return budgets.filter(b => b.month === monthStr);
        }

        function getMonthExpenses() {
            const monthStr = formatMonth(currentMonth);
            const startDate = monthStr + '-01T00:00:00.000Z';
            const endDate = monthStr + '-' + new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate() + 'T23:59:59.999Z';

            return accountData.records.filter(r => {
                if (r.type !== 'expense') return false;
                return r.date >= startDate && r.date <= endDate;
            });
        }

        function renderBudgets() {
            const monthBudgets = getMonthBudgets();
            const monthExpenses = getMonthExpenses();
            const expensesByCategory = {};
            monthExpenses.forEach(r => {
                if (!expensesByCategory[r.categoryId]) {
                    expensesByCategory[r.categoryId] = 0;
                }
                expensesByCategory[r.categoryId] += parseFloat(r.amount);
            });

            const totalExpenses = monthExpenses.reduce((sum, r) => sum + parseFloat(r.amount), 0);
            const totalBudgetAmount = monthBudgets.find(b => !b.categoryId)?.amount || 0;
            const totalSpent = totalExpenses;
            const totalPercent = totalBudgetAmount > 0 ? Math.min((totalSpent / totalBudgetAmount) * 100, 100) : 0;

            document.getElementById('totalBudgetAmount').textContent = `¥${totalBudgetAmount.toFixed(2)}`;
            document.getElementById('totalSpent').textContent = `已花费 ¥${totalSpent.toFixed(2)}`;
            document.getElementById('totalBudgetDisplay').textContent = `预算 ¥${totalBudgetAmount.toFixed(2)}`;
            document.getElementById('totalProgressBar').style.width = `${totalPercent}%`;

            if (totalSpent > totalBudgetAmount && totalBudgetAmount > 0) {
                document.getElementById('totalProgressBar').style.background = '#c62828';
            } else {
                document.getElementById('totalProgressBar').style.background = '#fff';
            }

            const listEl = document.getElementById('budgetList');
            listEl.innerHTML = '';

            const categoryBudgets = monthBudgets.filter(b => b.categoryId);
            if (categoryBudgets.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>暂无分类预算</div>
                    </div>
                `;
                return;
            }

            const categoryMap = {};
            accountData.categories.forEach(c => categoryMap[c.id] = c);

            categoryBudgets.forEach(budget => {
                const cat = categoryMap[budget.categoryId] || { icon: '📦', name: '未知', color: '#999' };
                const spent = expensesByCategory[budget.categoryId] || 0;
                const percent = budget.amount > 0 ? Math.min((spent / budget.amount) * 100, 100) : 0;
                const remaining = budget.amount - spent;
                const isOver = remaining < 0;

                const card = document.createElement('div');
                card.className = 'budget-card';
                card.innerHTML = `
                    <div class="budget-icon" style="background: ${cat.color}20;">${cat.icon}</div>
                    <div class="budget-info">
                        <div class="budget-name">${cat.name}</div>
                        <div class="budget-progress">
                            <div class="budget-progress-bar" style="width: ${percent}%; background: ${isOver ? '#c62828' : cat.color};"></div>
                        </div>
                    </div>
                    <div class="budget-stats">
                        <div class="budget-spent ${isOver ? 'budget-over' : ''}">¥${spent.toFixed(2)}</div>
                        <div class="budget-remaining">${isOver ? '超支' : '剩余'} ¥${Math.abs(remaining).toFixed(2)}</div>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function updateCategorySelect() {
            const select = document.getElementById('newBudgetCategory');
            select.innerHTML = '<option value="">总预算</option>';

            const expenseCategories = accountData.categories.filter(c => c.type === 'expense');
            expenseCategories.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${cat.icon} ${cat.name}</option>`;
            });
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('addBudgetForm').reset();
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        document.getElementById('addBudgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const categoryId = document.getElementById('newBudgetCategory').value;
            const amount = parseFloat(document.getElementById('newBudgetAmount').value);

            if (!amount || amount <= 0) {
                showToast('请输入有效金额');
                return;
            }

            const budget = {
                month: formatMonth(currentMonth),
                categoryId: categoryId || null,
                amount
            };

            try {
                await api.post('/budgets', { accountId: currentAccountId, budget });
                showToast('预算已添加');
                closeAddModal();

                budgets = await api.get(`/budgets/${currentAccountId}`);
                renderBudgets();
            } catch (err) {
                showToast('添加失败');
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        loadAccount();
    </script>
</body>
</html>
